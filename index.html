// ═══ EXCEL EXPORT / IMPORT ══════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function doExport(orders,projects,stages,workLogs,users){
  const FONT="Segoe UI";const wb=XLSX.utils.book_new();
  const HS=()=>({font:{name:FONT,sz:12,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1E3A5F"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2},border:{top:{style:"thin",color:{rgb:"D1D9E0"}},bottom:{style:"thin",color:{rgb:"D1D9E0"}},left:{style:"thin",color:{rgb:"D1D9E0"}},right:{style:"thin",color:{rgb:"D1D9E0"}}}});
  const bd={top:{style:"thin",color:{rgb:"D1D9E0"}},bottom:{style:"thin",color:{rgb:"D1D9E0"}},left:{style:"thin",color:{rgb:"D1D9E0"}},right:{style:"thin",color:{rgb:"D1D9E0"}}};
  const DS=(even)=>({font:{name:FONT,sz:11,color:{rgb:"1E293B"}},fill:{fgColor:{rgb:even?"EBF3FB":"FFFFFF"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2},border:bd});
  function mkSheet(headers,rows,cw,spFn){
    const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
    headers.forEach((_,c)=>{const a=XLSX.utils.encode_cell({r:0,c});if(ws[a])ws[a].s=HS()});
    ws["!rows"]=[{hpx:28}];
    rows.forEach((row,ri)=>{const even=ri%2===0;row.forEach((_,c)=>{const a=XLSX.utils.encode_cell({r:ri+1,c});if(!ws[a])return;ws[a].s=spFn?.(ri,c,row)||DS(even)});ws["!rows"].push({hpx:20})});
    ws["!cols"]=cw.map(w=>({wch:w}));if(!ws["!opts"])ws["!opts"]={};ws["!opts"].rightToLeft=true;
    return ws;
  }
  // 1: פקודות עבודה
  const h1=['מספר פק"ע','P/N','תיאור','פרויקט','כמות','מחיר ליחידה','הושלמו','תאריך קבלה','יעד אספקה','תקלות פתוחות'];
  const r1=orders.map(o=>{const pj=projects.find(p=>p.id===o.projectId);return[o.woNumber,o.pn||"",o.description||"",pj?.name||"",(o.serials||[]).length,Number(o.unitPrice||0),0,o.receivedDate||"",o.targetDate||"",(o.defects||[]).filter(d=>d.status!=="closed").length]});
  XLSX.utils.book_append_sheet(wb,mkSheet(h1,r1,[16,14,30,14,10,14,10,13,13,10]),"פקודות עבודה");
  // 2: סידוריים
  const h2=['פק"ע','P/N','S/N','סטטוס'];
  const r2=orders.flatMap(o=>(o.serials||[]).map(s=>[o.woNumber,o.pn||"",s.sn,"בתהליך"]));
  XLSX.utils.book_append_sheet(wb,mkSheet(h2,r2.length?r2:[["","","",""]],[16,14,20,10]),"סידוריים");
  // 3: תקלות
  const sevL2={critical:"קריטית",high:"גבוהה",medium:"בינונית",low:"נמוכה"};
  const typL2={quality:"איכות",process:"תהליך",material:"חומר גלם",equipment:"ציוד",human:"גורם אנושי",other:"אחר"};
  const h3=['פק"ע','S/N','כותרת','סוג','חומרה','אחראי','תאריך גילוי','סטטוס','תיאור'];
  const r3=orders.flatMap(o=>(o.defects||[]).map(d=>{const sn2=(o.serials||[]).find(s=>s.id===d.serialId);return[o.woNumber,sn2?.sn||"כללי",d.title,typL2[d.type]||"",sevL2[d.severity]||"",d.responsible||"",d.discoveredDate||"",d.status==="closed"?"סגורה":"פתוחה",d.description||""]}));
  const sevSt={complete:{font:{name:FONT,sz:11,bold:true,color:{rgb:"065F46"}},fill:{fgColor:{rgb:"D1FAE5"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2},border:bd},blocked:{font:{name:FONT,sz:11,bold:true,color:{rgb:"991B1B"}},fill:{fgColor:{rgb:"FEE2E2"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2},border:bd}};
  XLSX.utils.book_append_sheet(wb,mkSheet(h3,r3.length?r3:[["","","","","","","","",""]],[16,18,24,10,10,14,13,10,30],(ri,c,row)=>{if(c===7)return row[7]==="סגורה"?sevSt.complete:sevSt.blocked;return null}),"תקלות");
  // 4: לוג עבודה
  const h4=['עובד','פק"ע','S/N','שלב','התחלה','סיום','זמן (דק)'];
  const r4=workLogs.filter(w=>w.completed).sort((a,b)=>(b.endTime||"").localeCompare(a.endTime||"")).map(w=>[w.userName,orders.find(o=>o.id===w.orderId)?.woNumber||"",w.serialSn,stages.find(s=>s.id===w.stageId)?.name||"",w.startTime?.slice(0,16).replace("T"," ")||"",w.endTime?.slice(0,16).replace("T"," ")||"",w.durationMin||0]);
  XLSX.utils.book_append_sheet(wb,mkSheet(h4,r4.length?r4:[["","","","","","",0]],[14,14,18,14,18,18,10]),"לוג עבודה");
  // 5: ביצועי עובדים
  const h5=['עובד','תעריף שעתי','יחידות','שעות עבודה','יח/שעה','עלות','הכנסה','רווח'];
  const r5=users.filter(u=>u.role!=="admin"&&u.active!==false).map(u=>{const logs=workLogs.filter(w=>w.userId===u.id&&w.completed&&w.durationMin);const mins=logs.reduce((s,w)=>s+w.durationMin,0);const cost=mins*(Number(u.hourlyRate||0)/60);const rev=logs.reduce((s,w)=>{const o2=orders.find(o3=>(o3.serials||[]).some(sr=>sr.id===w.serialId));return s+Number(o2?.unitPrice||0)},0);return[u.name,Number(u.hourlyRate||0),logs.length,Math.round(mins/60*10)/10,mins>0?Math.round(logs.length/(mins/60)*10)/10:0,Math.round(cost),Math.round(rev),Math.round(rev-cost)]});
  XLSX.utils.book_append_sheet(wb,mkSheet(h5,r5.length?r5:[["",0,0,0,0,0,0,0]],[16,12,10,12,10,12,12,12]),"ביצועי עובדים");
  XLSX.writeFile(wb,"דוח_קו_ייצור_"+todays()+".xlsx");
}

function doImport(file,projects,stages,cb){
  const fr=new FileReader();
  fr.onload=e=>{try{
    const wb=XLSX.read(e.target.result,{type:"array"});const sn=wb.SheetNames;
    const wsO=wb.Sheets[sn[0]];if(!wsO){cb(null,"גיליון ריק");return}
    const rowsO=XLSX.utils.sheet_to_json(wsO,{defval:""});const oMap={};
    rowsO.forEach(r=>{const wo=String(r['מספר פק"ע']||r["WO"]||"").trim();if(!wo)return;const pn2=String(r["פרויקט"]||"").trim();
      oMap[wo]={id:uid(),woNumber:wo,pn:String(r["P/N"]||r["PN"]||"").trim(),description:String(r["תיאור"]||"").trim(),qty:Number(r["כמות"]||0),unitPrice:Number(r["מחיר ליחידה"]||r["מחיר"]||0),projectId:projects.find(p=>p.name===pn2)?.id||"",receivedDate:r["תאריך קבלה"]||"",targetDate:r["יעד אספקה"]||r["יעד"]||"",stageIds:stages.map(s=>s.id),serials:[],shortages:[],defects:[]}});
    // Sheet 2: serials
    const wsS=wb.Sheets[sn[1]];
    if(wsS)XLSX.utils.sheet_to_json(wsS,{defval:""}).forEach(r=>{const wo=String(r['פק"ע']||r['מספר פק"ע']||"").trim();if(!wo||!oMap[wo])return;const snV=String(r["S/N"]||r["SN"]||"").trim();if(!snV)return;oMap[wo].serials.push({id:uid(),sn:snV,createdAt:nowISO()})});
    // Sheet 3: defects
    const wsD=wb.Sheets[sn[2]];const sMap={"קריטית":"critical","גבוהה":"high","בינונית":"medium","נמוכה":"low"};const tMap={"איכות":"quality","תהליך":"process","חומר גלם":"material","ציוד":"equipment","גורם אנושי":"human","אחר":"other"};
    if(wsD)XLSX.utils.sheet_to_json(wsD,{defval:""}).forEach(r=>{const wo=String(r['פק"ע']||r['מספר פק"ע']||"").trim();if(!wo||!oMap[wo])return;const title=String(r["כותרת"]||r["תקלה"]||"").trim();if(!title)return;const snV2=String(r["S/N"]||"").trim();const ms=oMap[wo].serials.find(s=>s.sn===snV2);
      oMap[wo].defects.push({id:uid(),title,serialId:ms?.id||"",type:tMap[String(r["סוג"]||"")]||"other",severity:sMap[String(r["חומרה"]||"")]||"medium",description:String(r["תיאור"]||"").trim(),responsible:String(r["אחראי"]||"").trim(),discoveredDate:r["תאריך גילוי"]||todays(),status:String(r["סטטוס"]||"").includes("סגור")?"closed":"open"})});
    // Sheet 4: shortages
    const wsH=wb.Sheets[sn[3]];
    if(wsH)XLSX.utils.sheet_to_json(wsH,{defval:""}).forEach(r=>{const wo=String(r['פק"ע']||r['מספר פק"ע']||"").trim();if(!wo||!oMap[wo])return;const item=String(r["פריט"]||"").trim();if(!item)return;
      if(!oMap[wo].shortages)oMap[wo].shortages=[];
      oMap[wo].shortages.push({id:uid(),item,sku:String(r['מק"ט']||r["מקט"]||"").trim(),missing:Number(r["כמות"]||0),reason:String(r["סיבה"]||"").trim(),responsible:String(r["אחראי"]||"").trim(),orderedDate:r["תאריך הזמנה"]||todays(),note:String(r["הערה"]||"").trim(),received:false,receivedDate:null,receivedQty:0})});
    cb(Object.values(oMap),null);
  }catch(err){cb(null,"שגיאה: "+err.message)}};
  fr.readAsArrayBuffer(file);
}

  const [preview,setPreview]=useState(null);const[mode,setMode]=useState("replace");const[drag,setDrag]=useState(false);

  return(

        <div style={{fontSize:13,color:"var(--c-muted)",marginBottom:12}}>5 גיליונות: פקודות עבודה, סידוריים, תקלות, לוג עבודה, ביצועי עובדים — צבעוני ומעוצב</div>

        <div style={{display:"flex",gap:10,marginBottom:12}}><SegBtn options={[["replace","החלף הכל"],["merge","הוסף לקיימים"]]} value={mode} onChange={setMode}/></div>
        <div className={`dz${drag?" drag":""}`} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0])}} onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".xlsx,.xls";inp.onchange=ev=>handleFile(ev.target.files[0]);inp.click()}}>
          <div style={{fontSize:36,marginBottom:8}}>📁</div>
          <div style={{fontWeight:600,marginBottom:4}}>גרור קובץ Excel לכאן או לחץ לבחירה</div>
          <div style={{fontSize:12,color:"var(--c-dim)"}}>גיליונות: פקודות עבודה → סידוריים → תקלות</div>
        </div>
        {preview&&(<div style={{marginTop:14}}>
          <div style={{fontWeight:700,color:"#10b981",marginBottom:8}}>✅ {preview.length} פקעות | {preview.reduce((s,o)=>s+(o.serials||[]).length,0)} סידוריים | {preview.reduce((s,o)=>s+(o.defects||[]).length,0)} תקלות</div>
          <div style={{overflowX:"auto",marginBottom:10}}><table><thead><tr><th>פק"ע</th><th>P/N</th><th>תיאור</th><th>סידוריים</th><th>תקלות</th></tr></thead><tbody>{preview.slice(0,10).map(o=>(<tr key={o.id}><td style={{fontWeight:600}}>{o.woNumber}</td><td>{o.pn||"—"}</td><td>{o.description||"—"}</td><td>{(o.serials||[]).length}</td><td>{(o.defects||[]).length}</td></tr>))}</tbody></table></div>
          <div style={{display:"flex",gap:10}}><Btn color="#10b981" onClick={()=>{
            // Save snapshot for undo
            const snapshot=JSON.parse(JSON.stringify(orders));
            LS.set("importSnapshot",snapshot);
            const imported=mode==="replace"?preview:[...orders,...preview];
            updO(prev=>mode==="replace"?preview:[...prev,...preview]);
            addAuditEntry({userId:"admin",username:"admin",name:"מנהל",action:"ייבוא Excel",target:`${preview.length} פקעות`,details:`${mode==="replace"?"החלפה":"הוספה"} | ${preview.reduce((s2,o)=>s2+(o.serials||[]).length,0)} סידוריים | ${preview.reduce((s2,o)=>s2+(o.defects||[]).length,0)} תקלות | ${preview.reduce((s2,o)=>s2+(o.shortages||[]).length,0)} חוסרים`,canUndo:true});
            setPreview(null)}}>✅ אשר ({preview.length})</Btn><Btn onClick={()=>setPreview(null)}>ביטול</Btn></div>
        </div>)}
      </Card>
    </div>
  );
}

// ═══ ALERTS PANEL ════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function AlertsPanel({orders,stages,workLogs,users,onClose}){
  const alerts=useMemo(()=>{
    const a=[];
    // Critical/high defects
    orders.forEach(o=>(o.defects||[]).filter(d=>d.status!=="closed"&&(d.severity==="critical"||d.severity==="high")).forEach(d=>{
      a.push({sev:d.severity==="critical"?0:1,icon:d.severity==="critical"?"🔴":"🟠",text:`תקלה ${d.severity==="critical"?"קריטית":"גבוהה"}: ${d.title}`,sub:`פק"ע ${o.woNumber}${d.discoveredDate?` | ${fmt(d.discoveredDate)}`:""}`,color:d.severity==="critical"?"#dc2626":"#f97316"})}));
    // Overdue orders
    orders.filter(o=>o.targetDate&&new Date(o.targetDate)<new Date()).forEach(o=>{const d=daysBetween(o.targetDate,todays());if(d>0)a.push({sev:1,icon:"🚨",text:`פק"ע ${o.woNumber} באיחור ${d} ימים`,sub:`יעד: ${fmt(o.targetDate)}`,color:"#ef4444"})});
    // Workers stuck > 2h
    workLogs.filter(w=>!w.completed).forEach(w=>{const m=Math.round((Date.now()-new Date(w.startTime).getTime())/60000);if(m>120)a.push({sev:2,icon:"⏳",text:`${w.userName} תקוע ${fmtTime(m)} על ${w.serialSn}`,sub:stages.find(s=>s.id===w.stageId)?.name||"",color:"#f59e0b"})});
    // Low yield
    orders.forEach(o=>{const sn=(o.serials||[]).length,df=(o.defects||[]).filter(d=>d.status!=="closed").length;if(sn>0&&df/sn>.2)a.push({sev:2,icon:"📉",text:`Yield נמוך ב-${o.woNumber}: ${df}/${sn} תקלות`,sub:`${Math.round(df/sn*100)}% שיעור תקלות`,color:"#f97316"})});
    // No progress 7+ days
    orders.forEach(o=>{if(!(o.serials||[]).length)return;const last=workLogs.filter(w=>w.orderId===o.id&&w.completed).sort((x,y)=>(y.endTime||"").localeCompare(x.endTime||""))[0];if(last){const d=daysBetween(last.endTime?.slice(0,10),todays());if(d>7)a.push({sev:3,icon:"💤",text:`אין התקדמות ב-${o.woNumber} כבר ${d} ימים`,sub:`אחרון: ${fmt(last.endTime?.slice(0,10))}`,color:"#8b95a8"})}});
    return a.sort((x,y)=>x.sev-y.sev);
  },[orders,stages,workLogs]);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"#000c",zIndex:200,display:"flex",justifyContent:"flex-start"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--c-card)",width:"min(420px,90vw)",height:"100%",overflowY:"auto",borderLeft:"1px solid var(--c-border)",padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:18}}>🔔 התראות ({alerts.length})</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"var(--c-muted)"}}>✕</button>
        </div>
        {alerts.length===0?<div style={{textAlign:"center",padding:40,color:"var(--c-dim)"}}><div style={{fontSize:40,marginBottom:10}}>✅</div>הכל תקין!</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {alerts.map((a,i)=>(<div key={i} style={{background:"var(--c-deep)",borderRadius:10,padding:"12px 14px",borderRight:`4px solid ${a.color}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:16}}>{a.icon}</span><span style={{fontWeight:600,fontSize:13,color:a.color,flex:1}}>{a.text}</span></div>
              {a.sub&&<div style={{fontSize:11,color:"var(--c-dim)",paddingRight:24}}>{a.sub}</div>}
            </div>))}
          </div>
        )}
      </div>
    </div>
  );
}

  useEffect(()=>{oRef.current=orders},[orders]);
  useEffect(()=>{pRef.current=projects},[projects]);
  useEffect(()=>{sRef.current=stages},[stages]);
  useEffect(()=>{wRef.current=workLogs},[workLogs]);

  // ── Refresh from Google Sheets ──────────────────────────────────
  const lastPersistRef=useRef(0);
  const refreshFromGS=useCallback(async(force)=>{
    // Skip if we just saved (prevents overwriting local changes with stale GS data)
    if(!force&&Date.now()-lastPersistRef.current<5000)return;
    setSync("saving");
    try{
      const [data,users]=await Promise.all([gsLoad(),gsLoadUsers()]);
      if(data){
        if(data.orders)setOrders(data.orders);
        if(data.projects)setProjects(data.projects);
        if(data.stages)setStages(data.stages);
        if(data.workLogs)setWorkLogs(data.workLogs);
        if(data.customTasks)setCustomTasks(data.customTasks);
      }
      if(users)LS.set("users",users);
      setSync("ok");
    }catch{setSync("error")}
  },[]);

  // Auto-refresh when tab becomes visible (user switches back to app)
  useEffect(()=>{
    const handler=()=>{if(document.visibilityState==="visible")refreshFromGS()};
    document.addEventListener("visibilitychange",handler);
    return()=>document.removeEventListener("visibilitychange",handler);
  },[refreshFromGS]);

  // Polling every 30 seconds
  useEffect(()=>{
    const interval=setInterval(()=>refreshFromGS(),30000);
    return()=>clearInterval(interval);
  },[refreshFromGS]);

  const ctRef=useRef(customTasks);
  useEffect(()=>{ctRef.current=customTasks},[customTasks]);

  const persist=(no,np,ns,nw,nct)=>{
    const o=no??oRef.current,p=np??pRef.current,s=ns??sRef.current,w=nw??wRef.current,ct=nct??ctRef.current;
    LS.set("orders",o);LS.set("projects",p);LS.set("stages",s);LS.set("workLogs",w);LS.set("customTasks",ct);
    lastPersistRef.current=Date.now();
    setSync("saving");clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await fetch(GS_URL,{method:"POST",body:JSON.stringify({action:"save",payload:{orders:o,projects:p,stages:s,workLogs:w,customTasks:ct}})});setSync("ok")}catch{setSync("error")}},800);
  };

  const handleLogin=u=>{setCurrentUser(u);try{localStorage.setItem(LS_PREFIX+"session",JSON.stringify({id:u.id,username:u.username}))}catch{}};
  const handleLogout=()=>{
    if(currentUser)addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"התנתקות",target:"",details:""});
    setCurrentUser(null);try{localStorage.removeItem(LS_PREFIX+"session")}catch{}
  };

  const canEdit=currentUser?.role==="admin"||currentUser?.role==="editor"||currentUser?.canEdit===true;
  const canViewProject=pid=>{if(!currentUser)return false;if(currentUser.role==="admin")return true;const pa=currentUser.projectAccess;if(pa==="all")return true;if(Array.isArray(pa))return pa.includes(pid);return pa===pid};

  const filteredProjects=projects.filter(p=>canViewProject(p.id));
  const filteredOrders=orders.filter(o=>canViewProject(o.projectId));
  const filteredWorkLogs=workLogs;

  const updO=useCallback((fn)=>{setOrders(prev=>{const next=typeof fn==="function"?fn(prev):fn;persist(next,null,null,null);return next})},[]);
  const updP=useCallback((fn)=>{setProjects(prev=>{const next=typeof fn==="function"?fn(prev):fn;persist(null,next,null,null);return next})},[]);

  const handleStartWork=(log)=>{
    setWorkLogs(prev=>{const next=[...prev,log];persist(null,null,null,next);return next});
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"התחלת עבודה",target:log.serialSn,details:stages.find(s=>s.id===log.stageId)?.name||""});
  };
  const handleEndWork=(logId,duration)=>{
    setWorkLogs(prev=>{
      const next=prev.map(w=>w.id===logId?{...w,completed:true,endTime:nowISO(),durationMin:duration}:w);
      persist(null,null,null,next);
      return next;
    });
    const log=workLogs.find(w=>w.id===logId);
    if(log)addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"סיום עבודה",target:log.serialSn,details:`${fmtTime(duration)} — ${stages.find(s=>s.id===log.stageId)?.name||""}`});
  };
  const handlePauseWork=(logId)=>{
    setWorkLogs(prev=>{const next=prev.map(w=>w.id===logId?{...w,paused:true,pauseStart:nowISO(),pauseLog:[...(w.pauseLog||[]),{start:nowISO()}]}:w);persist(null,null,null,next);return next});
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"הפסקה",target:"",details:""});
  };
  const handleResumeWork=(logId)=>{
    setWorkLogs(prev=>{const next=prev.map(w=>{if(w.id!==logId)return w;const pauseMin=w.pauseStart?Math.round((Date.now()-new Date(w.pauseStart).getTime())/60000):0;const pl=[...(w.pauseLog||[])];if(pl.length>0&&!pl[pl.length-1].end)pl[pl.length-1].end=nowISO();return{...w,paused:false,pauseStart:null,totalPauseMin:(w.totalPauseMin||0)+pauseMin,pauseLog:pl}});persist(null,null,null,next);return next});
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"חזרה מהפסקה",target:"",details:""});
  };
  // Custom tasks
  const handleAddTask=(task)=>{setCustomTasks(prev=>{const next=[...prev,task];persist(null,null,null,null,next);return next})};
  const handleStartTask=(taskId)=>{setCustomTasks(prev=>{const next=prev.map(t=>t.id===taskId?{...t,active:true,startTime:nowISO()}:t);persist(null,null,null,null,next);return next})};
  const handleEndTask=(taskId)=>{setCustomTasks(prev=>{const next=prev.map(t=>{if(t.id!==taskId)return t;const dur=t.startTime?Math.round((Date.now()-new Date(t.startTime).getTime())/60000)-(t.totalPauseMin||0):0;return{...t,active:false,completed:true,endTime:nowISO(),durationMin:Math.max(0,dur)}});persist(null,null,null,null,next);return next})};
  const handlePauseTask=(taskId)=>{setCustomTasks(prev=>{const next=prev.map(t=>t.id===taskId?{...t,paused:true,pauseStart:nowISO(),pauseLog:[...(t.pauseLog||[]),{start:nowISO()}]}:t);persist(null,null,null,null,next);return next})};
  const handleResumeTask=(taskId)=>{setCustomTasks(prev=>{const next=prev.map(t=>{if(t.id!==taskId)return t;const pMin=t.pauseStart?Math.round((Date.now()-new Date(t.pauseStart).getTime())/60000):0;const pl=[...(t.pauseLog||[])];if(pl.length>0&&!pl[pl.length-1].end)pl[pl.length-1].end=nowISO();return{...t,paused:false,pauseStart:null,totalPauseMin:(t.totalPauseMin||0)+pMin,pauseLog:pl}});persist(null,null,null,null,next);return next})};
  const handleDeleteTask=(taskId)=>{setCustomTasks(prev=>{const next=prev.filter(t=>t.id!==taskId);persist(null,null,null,null,next);return next})};
  // Listen for delete from WorkersDashboard
  useEffect(()=>{const h=(e)=>{setCustomTasks(prev=>{const next=prev.filter(t=>t.id!==e.detail);persist(null,null,null,null,next);return next})};window.addEventListener("deleteTask",h);return()=>window.removeEventListener("deleteTask",h)},[]);

  const isAdmin=currentUser?.role==="admin";
  const isWorker=currentUser?.role==="worker";

  const TABS=isAdmin?[
    {id:"dashboard",label:"📊 דאשבורד"},
    {id:"orders",label:'📋 פק"ע'},
    {id:"shortages",label:"⚠️ חוסרים"},
    {id:"mywork",label:"🔨 עבודה"},
    {id:"workers",label:"👥 עובדים"},
    {id:"yield",label:"📉 Yield"},
    {id:"stages",label:"🔧 שלבים"},
    {id:"projects",label:"🏗️ פרויקטים"},
    {id:"excel",label:"📂 Excel"},
  ]:isWorker?[
    {id:"mywork",label:"🔨 העבודה שלי"},
    {id:"orders",label:'📋 פק"ע'},
  ]:[
    {id:"dashboard",label:"📊 דאשבורד"},
    {id:"orders",label:'📋 פק"ע'},
    {id:"shortages",label:"⚠️ חוסרים"},
    {id:"mywork",label:"🔨 עבודה"},
    {id:"projects",label:"🏗️ פרויקטים"},
  ];

  // Alert count for badge
  const alertCount=useMemo(()=>{let c=0;filteredOrders.forEach(o=>(o.defects||[]).filter(d=>d.status!=="closed"&&(d.severity==="critical"||d.severity==="high")).forEach(()=>c++));filteredOrders.filter(o=>o.targetDate&&new Date(o.targetDate)<new Date()).forEach(()=>c++);filteredWorkLogs.filter(w=>!w.completed).forEach(w=>{if(Math.round((Date.now()-new Date(w.startTime).getTime())/60000)>120)c++});return c},[filteredOrders,filteredWorkLogs]);

  // PWA Install
  useEffect(()=>{const isi=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;if(isi)return;const h=e=>{e.preventDefault();setInstallPrompt(e);setShowInstall(true)};window.addEventListener("beforeinstallprompt",h);window.addEventListener("appinstalled",()=>{setShowInstall(false);setInstallPrompt(null)});return()=>window.removeEventListener("beforeinstallprompt",h)},[]);
  // Service Worker
  useEffect(()=>{if(!("serviceWorker" in navigator))return;navigator.serviceWorker.register("./sw.js?v=3").then(reg=>{swRegRef.current=reg;if(reg.waiting)setShowUpdate(true);reg.addEventListener("updatefound",()=>{const nw=reg.installing;if(!nw)return;nw.addEventListener("statechange",()=>{if(nw.state==="installed"&&navigator.serviceWorker.controller)setShowUpdate(true)})});setInterval(()=>reg.update(),30*60*1000)}).catch(()=>{});navigator.serviceWorker.addEventListener("controllerchange",()=>window.location.reload())},[]);
  const handleInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();setInstallPrompt(null);setShowInstall(false)};
  const handleUpdate=()=>{const r=swRegRef.current;if(r?.waiting)r.waiting.postMessage({type:"SKIP_WAITING"});else window.location.reload();setShowUpdate(false)};

  if(!currentUser)return(<AuthCtx.Provider value={{currentUser,canEdit:false,canViewProject:()=>false}}><LoginScreen onLogin={handleLogin} lightMode={lightMode} toggleLight={()=>setLightMode(p=>!p)}/></AuthCtx.Provider>);
  if(loading)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}><div style={{fontSize:48}}>⚙️</div><div style={{color:"#60a5fa",fontSize:20,fontWeight:700}}>טוען...</div></div>);

  // Default tab for workers
  if(isWorker&&tab==="dashboard")setTab("mywork");
  const lm=lightMode;

  return(
    <AuthCtx.Provider value={{currentUser,canEdit,canViewProject}}>
      {showUpdate&&<UpdateBanner onUpdate={handleUpdate} onDismiss={()=>setShowUpdate(false)} lm={lm}/>}
      <Navbar tab={tab} setTab={setTab} tabs={TABS} lightMode={lightMode} toggleLight={()=>setLightMode(p=>!p)} sync={sync} onAdmin={()=>setShowAdmin(true)} onLogout={handleLogout} alertCount={alertCount} onAlerts={()=>setShowAlerts(true)} onRefresh={()=>refreshFromGS(true)}/>
      <main className="main-content" style={{maxWidth:1440,margin:"0 auto",padding:"16px 14px",paddingBottom:showInstall?"100px":"calc(16px + env(safe-area-inset-bottom,0px))"}}>
        {tab==="dashboard"&&<Dashboard orders={filteredOrders} projects={filteredProjects} stages={stages} users={getUsers()} workLogs={filteredWorkLogs}/>}
        {tab==="orders"&&<Orders orders={filteredOrders} projects={filteredProjects} stages={stages} stageBlocks={stageBlocks} updO={updO} workLogs={filteredWorkLogs}/>}
        {tab==="shortages"&&<Shortages orders={filteredOrders} updO={updO} projects={filteredProjects}/>}
        {tab==="mywork"&&<MyWork orders={filteredOrders} stages={stages} workLogs={filteredWorkLogs} onStartWork={handleStartWork} onEndWork={handleEndWork} onPauseWork={handlePauseWork} onResumeWork={handleResumeWork} customTasks={customTasks} onAddTask={handleAddTask} onStartTask={handleStartTask} onEndTask={handleEndTask} onPauseTask={handlePauseTask} onResumeTask={handleResumeTask} onDeleteTask={handleDeleteTask}/>}
        {tab==="workers"&&isAdmin&&<WorkersDashboard users={getUsers()} workLogs={filteredWorkLogs} orders={filteredOrders} stages={stages} customTasks={customTasks} onAddTask={handleAddTask}/>}
        {tab==="yield"&&<YieldDashboard orders={filteredOrders} projects={filteredProjects} stages={stages} workLogs={filteredWorkLogs}/>}
        {tab==="stages"&&isAdmin&&<StagesManagement stages={stages} setStages={setStages} stageBlocks={stageBlocks} setStageBlocks={setStageBlocks} persist={persist}/>}
        {tab==="projects"&&<Projects projects={filteredProjects} orders={filteredOrders} updP={updP} stages={stages} workLogs={filteredWorkLogs}/>}
        {tab==="excel"&&isAdmin&&<ExcelTab orders={filteredOrders} projects={filteredProjects} stages={stages} workLogs={filteredWorkLogs} users={getUsers()} updO={updO}/>}
      </main>
      {showInstall&&<InstallBanner onInstall={handleInstall} onDismiss={()=>setShowInstall(false)} lm={lm}/>}
      {showAdmin&&isAdmin&&<AdminPanel projects={projects} stages={stages} onClose={()=>setShowAdmin(false)} lightMode={lightMode} updO={updO}/>}
      {showAlerts&&<AlertsPanel orders={filteredOrders} stages={stages} workLogs={filteredWorkLogs} users={getUsers()} onClose={()=>setShowAlerts(false)}/>}
    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
