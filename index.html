// ═══ NAVBAR ═════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function Navbar({tab,setTab,tabs,lightMode,toggleLight,sync,onAdmin,onLogout,alertCount,onAlerts}){
  const {currentUser}=useAuth();
  const [menuOpen,setMenuOpen]=useState(false);
  const lm=lightMode;
  const navBg=lm?"#ffffff":"#131829";
  const navBorder=lm?"#dde1e8":"#1e2a42";
  const navMuted=lm?"#5a6478":"#8b95a8";
  const navActive=lm?"#2563eb":"#60a5fa";
  return(
    <div className="nav-wrapper" style={{background:navBg,borderBottom:`1px solid ${navBorder}`,position:"sticky",top:0,zIndex:50,transition:"background .3s"}}>
      <div style={{maxWidth:1440,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",gap:0,height:52}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,paddingLeft:8}}>
          <div style={{fontWeight:800,fontSize:15,color:navActive,whiteSpace:"nowrap"}}>⚙️ קו ייצור</div>
          <span style={{fontSize:9,background:navActive+"22",color:navActive,padding:"2px 6px",borderRadius:10,border:`1px solid ${navActive}44`,fontWeight:700}}>v{APP_VERSION}</span>
        </div>
        <div className="desk-nav" style={{flex:1,overflowX:"auto",scrollbarWidth:"none",justifyContent:"flex-start"}}>
          {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"0 14px",height:52,background:"none",border:"none",color:tab===t.id?navActive:navMuted,borderBottom:tab===t.id?`3px solid ${navActive}`:"3px solid transparent",fontWeight:tab===t.id?700:400,fontSize:13,whiteSpace:"nowrap",fontFamily:"inherit"}}>{t.label}</button>))}
        </div>
        <div className="hide-mobile" style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          <button onClick={onAlerts} style={{background:alertCount>0?"#ef444422":"transparent",border:`1px solid ${alertCount>0?"#ef4444":navBorder}`,borderRadius:8,padding:"5px 10px",fontSize:14,color:alertCount>0?"#ef4444":navMuted,fontFamily:"inherit",position:"relative"}}>🔔{alertCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,borderRadius:10,padding:"1px 5px",minWidth:16,textAlign:"center"}}>{alertCount}</span>}</button>
          <button onClick={toggleLight} style={{background:lm?"#e2e8f0":"#0d1120",border:`1px solid ${navBorder}`,borderRadius:8,padding:"5px 12px",fontSize:13,color:navMuted,fontFamily:"inherit"}}>{lm?"🌙":"☀️"}</button>
          {currentUser?.role==="admin"&&<button onClick={onAdmin} style={{background:"#f59e0b22",border:"1px solid #f59e0b44",color:"#f59e0b",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>🛡️</button>}
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:lm?"#e2e8f0":"#0d1120",borderRadius:8,border:`1px solid ${navBorder}`}}>
            <span style={{fontSize:12,color:navActive,fontWeight:700}}>{currentUser?.name}</span>
            <span style={{color:navMuted}}>·</span>
            <button onClick={onLogout} style={{background:"none",border:"none",color:"#ef4444",fontSize:12,padding:0,fontWeight:600,fontFamily:"inherit"}}>יציאה</button>
          </div>
        </div>
        <div className="show-mobile-only" style={{display:"flex",gap:6,alignItems:"center",marginRight:"auto"}}>
          <button onClick={onAlerts} style={{background:"none",border:`1px solid ${navBorder}`,borderRadius:8,padding:"5px 8px",fontSize:14,color:alertCount>0?"#ef4444":navMuted,position:"relative"}}>🔔{alertCount>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",color:"#fff",fontSize:9,borderRadius:10,padding:"1px 4px"}}>{alertCount}</span>}</button>
          <button onClick={()=>setMenuOpen(p=>!p)} style={{background:"none",border:`1px solid ${navBorder}`,borderRadius:8,padding:"5px 10px",fontSize:18,color:navMuted,lineHeight:1}}>{menuOpen?"✕":"☰"}</button>
        </div>
      </div>
      <div className="mob-tabs" style={{borderTop:`1px solid ${navBorder}`}}>
        {tabs.map(t=>(<button key={t.id} onClick={()=>{setTab(t.id);setMenuOpen(false)}} style={{flex:"0 0 auto",padding:"8px 12px",background:"none",border:"none",color:tab===t.id?navActive:navMuted,borderBottom:tab===t.id?`3px solid ${navActive}`:"3px solid transparent",fontWeight:tab===t.id?700:400,fontSize:12,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.label}</button>))}
      </div>
      {menuOpen&&(
        <div style={{background:navBg,borderBottom:`1px solid ${navBorder}`,padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,color:navActive,fontWeight:700}}>👤 {currentUser?.name}</span>
            <button onClick={()=>{onLogout();setMenuOpen(false)}} style={{marginRight:"auto",background:"#450a0a",color:"#fca5a5",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,fontFamily:"inherit"}}>יציאה</button>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>{toggleLight();setMenuOpen(false)}} style={{background:lm?"#e2e8f0":"#0d1120",border:`1px solid ${navBorder}`,borderRadius:8,padding:"7px 14px",fontSize:13,color:navMuted,fontFamily:"inherit"}}>{lm?"🌙 כהה":"☀️ בהיר"}</button>
            {currentUser?.role==="admin"&&<button onClick={()=>{onAdmin();setMenuOpen(false)}} style={{background:"#f59e0b22",border:"1px solid #f59e0b44",color:"#f59e0b",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>🛡️ ניהול</button>}
          </div>
        </div>
      )}
    </div>
  );
}

    mkLog("sn2a","BET-SNS-0001","s2","w5","2026-01-13T08:00:00",38,"o2");
    mkLog("sn2a","BET-SNS-0001","s3","w5","2026-01-14T08:00:00",30,"o2");
    mkLog("sn2a","BET-SNS-0001","s5","w3","2026-01-15T08:00:00",24,"o2");
    mkLog("sn2a","BET-SNS-0001","s6","w4","2026-01-16T07:30:00",10,"o2");
    mkLog("sn2b","BET-SNS-0002","s1","w4","2026-01-13T07:30:00",14,"o2");
    mkLog("sn2b","BET-SNS-0002","s2","w2","2026-01-14T08:00:00",40,"o2");
    mkLog("sn2b","BET-SNS-0002","s3","w2","2026-01-15T08:00:00",28,"o2");
    mkLog("sn2b","BET-SNS-0002","s5","w3","2026-01-16T08:00:00",20,"o2");
    mkLog("sn2b","BET-SNS-0002","s6","w3","2026-01-17T07:30:00",12,"o2");
    mkLog("sn2c","BET-SNS-0003","s1","w1","2026-01-14T07:30:00",16,"o2");
    mkLog("sn2c","BET-SNS-0003","s2","w5","2026-01-15T08:00:00",42,"o2");
    mkLog("sn2c","BET-SNS-0003","s3","w5","2026-01-16T08:00:00",34,"o2");
    mkLog("sn2c","BET-SNS-0003","s5","w4","2026-01-17T08:00:00",22,"o2");
    mkLog("sn2c","BET-SNS-0003","s6","w4","2026-01-18T07:30:00",11,"o2");
    // Serial 4: stages 1-2 done
    mkLog("sn2d","BET-SNS-0004","s1","w1","2026-02-10T07:30:00",18,"o2");
    mkLog("sn2d","BET-SNS-0004","s2","w2","2026-02-11T08:00:00",45,"o2");
    // Serial 5: stage 1 done
    mkLog("sn2e","BET-SNS-0005","s1","w4","2026-02-15T07:30:00",17,"o2");
    // Serial 6: nothing done yet

    // WO-2603 (5 serials, stages s1,s2,s3,s4,s5) — serial 1 fully done, 2 partially
    mkLog("sn3a","GAM-MOT-0001","s1","w1","2026-02-03T07:30:00",25,"o3");
    mkLog("sn3a","GAM-MOT-0001","s2","w5","2026-02-04T08:00:00",65,"o3");
    mkLog("sn3a","GAM-MOT-0001","s3","w5","2026-02-05T08:00:00",55,"o3");
    mkLog("sn3a","GAM-MOT-0001","s4","w3","2026-02-06T08:00:00",40,"o3");
    mkLog("sn3a","GAM-MOT-0001","s5","w3","2026-02-07T08:00:00",30,"o3");
    mkLog("sn3b","GAM-MOT-0002","s1","w4","2026-02-05T07:30:00",22,"o3");
    mkLog("sn3b","GAM-MOT-0002","s2","w2","2026-02-06T08:00:00",58,"o3");
    mkLog("sn3b","GAM-MOT-0002","s3","w2","2026-02-07T08:00:00",48,"o3");
    // Serial 3: stage 1 done
    mkLog("sn3c","GAM-MOT-0003","s1","w1","2026-02-10T07:30:00",24,"o3");
    // Serials 4-5: nothing

    // WO-2604 (4 serials, all 6 stages) — serial 1: stages 1-4 done, serial 2: stage 1
    mkLog("sn4a","ALF-PWR-0001","s1","w1","2026-02-18T07:30:00",14,"o4");
    mkLog("sn4a","ALF-PWR-0001","s2","w2","2026-02-19T08:00:00",35,"o4");
    mkLog("sn4a","ALF-PWR-0001","s3","w2","2026-02-20T08:00:00",28,"o4");
    mkLog("sn4a","ALF-PWR-0001","s4","w3","2026-02-21T08:00:00",22,"o4");
    mkLog("sn4b","ALF-PWR-0002","s1","w4","2026-03-01T07:30:00",16,"o4");

    // WO-2605 (3 serials, all 6 stages) — serial 1: stage 1 done only
    mkLog("sn5a","BET-CTL-0001","s1","w1","2026-03-05T07:30:00",20,"o3");

    setOrders(demoOrders);
    setWorkLogs(demoLogs);
    // Save users to LS so login works
    LS.set("users",FALLBACK_USERS);
    setLoading(false);
  },[]);

  useEffect(()=>{oRef.current=orders},[orders]);
  useEffect(()=>{pRef.current=projects},[projects]);
  useEffect(()=>{sRef.current=stages},[stages]);
  useEffect(()=>{wRef.current=workLogs},[workLogs]);

  const persist=(no,np,ns,nw)=>{
    const o=no??oRef.current,p=np??pRef.current,s=ns??sRef.current,w=nw??wRef.current;
    LS.set("orders",o);LS.set("projects",p);LS.set("stages",s);LS.set("workLogs",w);
    if(GS_URL){setSync("saving");clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{await fetch(GS_URL,{method:"POST",body:JSON.stringify({action:"save",payload:{orders:o,projects:p,stages:s,workLogs:w}})});setSync("ok")}catch{setSync("error")}},800)}
  };

  const handleLogin=u=>{setCurrentUser(u);try{localStorage.setItem(LS_PREFIX+"session",JSON.stringify({id:u.id,username:u.username}))}catch{}};
  const handleLogout=()=>{
    if(currentUser)addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"התנתקות",target:"",details:""});
    setCurrentUser(null);try{localStorage.removeItem(LS_PREFIX+"session")}catch{}
  };

  const canEdit=currentUser?.role==="admin"||currentUser?.role==="editor"||currentUser?.canEdit===true;
  const canViewProject=pid=>{if(!currentUser)return false;if(currentUser.role==="admin")return true;const pa=currentUser.projectAccess;if(pa==="all")return true;if(Array.isArray(pa))return pa.includes(pid);return pa===pid};

  const filteredProjects=projects.filter(p=>canViewProject(p.id));
  const filteredOrders=orders.filter(o=>canViewProject(o.projectId));
  const filteredWorkLogs=workLogs;

  const updO=useCallback((fn)=>{setOrders(prev=>{const next=typeof fn==="function"?fn(prev):fn;persist(next,null,null,null);return next})},[]);
  const updP=useCallback((fn)=>{setProjects(prev=>{const next=typeof fn==="function"?fn(prev):fn;persist(null,next,null,null);return next})},[]);

  const handleStartWork=(log)=>{
    setWorkLogs(prev=>{const next=[...prev,log];persist(null,null,null,next);return next});
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"התחלת עבודה",target:log.serialSn,details:stages.find(s=>s.id===log.stageId)?.name||""});
  };
  const handleEndWork=(logId,duration)=>{
    setWorkLogs(prev=>{
      const next=prev.map(w=>w.id===logId?{...w,completed:true,endTime:nowISO(),durationMin:duration}:w);
      persist(null,null,null,next);
      return next;
    });
    const log=workLogs.find(w=>w.id===logId);
    if(log)addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"סיום עבודה",target:log.serialSn,details:`${fmtTime(duration)} — ${stages.find(s=>s.id===log.stageId)?.name||""}`});
  };

  const isAdmin=currentUser?.role==="admin";
  const isWorker=currentUser?.role==="worker";

  const TABS=isAdmin?[
    {id:"dashboard",label:"📊 דאשבורד"},
    {id:"orders",label:'📋 פק"ע'},
    {id:"mywork",label:"🔨 עבודה"},
    {id:"workers",label:"👥 עובדים"},
    {id:"yield",label:"📉 Yield"},
    {id:"stages",label:"🔧 שלבים"},
    {id:"projects",label:"🏗️ פרויקטים"},
    {id:"excel",label:"📂 Excel"},
  ]:isWorker?[
    {id:"mywork",label:"🔨 העבודה שלי"},
    {id:"orders",label:'📋 פק"ע'},
  ]:[
    {id:"dashboard",label:"📊 דאשבורד"},
    {id:"orders",label:'📋 פק"ע'},
    {id:"mywork",label:"🔨 עבודה"},
    {id:"projects",label:"🏗️ פרויקטים"},
  ];

  // Alert count for badge
  const alertCount=useMemo(()=>{let c=0;filteredOrders.forEach(o=>(o.defects||[]).filter(d=>d.status!=="closed"&&(d.severity==="critical"||d.severity==="high")).forEach(()=>c++));filteredOrders.filter(o=>o.targetDate&&new Date(o.targetDate)<new Date()).forEach(()=>c++);filteredWorkLogs.filter(w=>!w.completed).forEach(w=>{if(Math.round((Date.now()-new Date(w.startTime).getTime())/60000)>120)c++});return c},[filteredOrders,filteredWorkLogs]);

  // PWA Install
  useEffect(()=>{const isi=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone;if(isi)return;const h=e=>{e.preventDefault();setInstallPrompt(e);setShowInstall(true)};window.addEventListener("beforeinstallprompt",h);window.addEventListener("appinstalled",()=>{setShowInstall(false);setInstallPrompt(null)});return()=>window.removeEventListener("beforeinstallprompt",h)},[]);
  // Service Worker
  useEffect(()=>{if(!("serviceWorker" in navigator))return;navigator.serviceWorker.register("./sw.js?v=2").then(reg=>{swRegRef.current=reg;if(reg.waiting)setShowUpdate(true);reg.addEventListener("updatefound",()=>{const nw=reg.installing;if(!nw)return;nw.addEventListener("statechange",()=>{if(nw.state==="installed"&&navigator.serviceWorker.controller)setShowUpdate(true)})});setInterval(()=>reg.update(),30*60*1000)}).catch(()=>{});navigator.serviceWorker.addEventListener("controllerchange",()=>window.location.reload())},[]);
  const handleInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();setInstallPrompt(null);setShowInstall(false)};
  const handleUpdate=()=>{const r=swRegRef.current;if(r?.waiting)r.waiting.postMessage({type:"SKIP_WAITING"});else window.location.reload();setShowUpdate(false)};

  if(!currentUser)return(<AuthCtx.Provider value={{currentUser,canEdit:false,canViewProject:()=>false}}><LoginScreen onLogin={handleLogin} lightMode={lightMode} toggleLight={()=>setLightMode(p=>!p)}/></AuthCtx.Provider>);
  if(loading)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}><div style={{fontSize:48}}>⚙️</div><div style={{color:"#60a5fa",fontSize:20,fontWeight:700}}>טוען...</div></div>);

  // Default tab for workers
  if(isWorker&&tab==="dashboard")setTab("mywork");
  const lm=lightMode;

  return(
    <AuthCtx.Provider value={{currentUser,canEdit,canViewProject}}>
      {showUpdate&&<UpdateBanner onUpdate={handleUpdate} onDismiss={()=>setShowUpdate(false)} lm={lm}/>}
      <Navbar tab={tab} setTab={setTab} tabs={TABS} lightMode={lightMode} toggleLight={()=>setLightMode(p=>!p)} sync={sync} onAdmin={()=>setShowAdmin(true)} onLogout={handleLogout} alertCount={alertCount} onAlerts={()=>setShowAlerts(true)}/>
      <main className="main-content" style={{maxWidth:1440,margin:"0 auto",padding:"16px 14px",paddingBottom:showInstall?"100px":"calc(16px + env(safe-area-inset-bottom,0px))"}}>
        {tab==="dashboard"&&<Dashboard orders={filteredOrders} projects={filteredProjects} stages={stages} users={getUsers()} workLogs={filteredWorkLogs}/>}
        {tab==="orders"&&<Orders orders={filteredOrders} projects={filteredProjects} stages={stages} updO={updO} workLogs={filteredWorkLogs}/>}
        {tab==="mywork"&&<MyWork orders={filteredOrders} stages={stages} workLogs={filteredWorkLogs} onStartWork={handleStartWork} onEndWork={handleEndWork}/>}
        {tab==="workers"&&isAdmin&&<WorkersDashboard users={getUsers()} workLogs={filteredWorkLogs} orders={filteredOrders} stages={stages}/>}
        {tab==="yield"&&<YieldDashboard orders={filteredOrders} projects={filteredProjects} stages={stages} workLogs={filteredWorkLogs}/>}
        {tab==="stages"&&isAdmin&&<StagesManagement stages={stages} setStages={setStages} persist={persist}/>}
        {tab==="projects"&&<Projects projects={filteredProjects} orders={filteredOrders} updP={updP} stages={stages} workLogs={filteredWorkLogs}/>}
        {tab==="excel"&&isAdmin&&<ExcelTab orders={filteredOrders} projects={filteredProjects} stages={stages} workLogs={filteredWorkLogs} users={getUsers()} updO={updO}/>}
      </main>
      {showInstall&&<InstallBanner onInstall={handleInstall} onDismiss={()=>setShowInstall(false)} lm={lm}/>}
      {showAdmin&&isAdmin&&<AdminPanel projects={projects} stages={stages} onClose={()=>setShowAdmin(false)} lightMode={lightMode}/>}
      {showAlerts&&<AlertsPanel orders={filteredOrders} stages={stages} workLogs={filteredWorkLogs} users={getUsers()} onClose={()=>setShowAlerts(false)}/>}
    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
