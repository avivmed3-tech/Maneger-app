      <Card style={{padding:"12px 14px",marginBottom:12,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:3,flex:"1 1 150px"}}><label style={{fontSize:11,color:"var(--c-dim)"}}>חיפוש</label><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש לפי מספר / תיאור / P/N..."/></div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}><label style={{fontSize:11,color:"var(--c-dim)"}}>פרויקט</label><select value={filterProj} onChange={e=>setFilterProj(e.target.value)} style={{padding:"7px 8px",fontSize:12}}><option value="all">כל הפרויקטים</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
        <div style={{fontSize:12,color:"var(--c-dim)",paddingBottom:4}}>{filtered.length} פק"ע</div>
      </Card>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {filtered.length===0&&<div style={{color:"var(--c-dim)",textAlign:"center",padding:40}}>אין פק"ע להצגה</div>}
        {filtered.map(o=>{
          const serials=o.serials||[];
          const oStages=(o.stageIds||[]).map(sid=>stages.find(s=>s.id===sid)).filter(Boolean);
          const completed=serials.filter(s=>oStages.every(st=>workLogs.some(w=>w.serialId===s.id&&w.stageId===st.id&&w.completed))).length;
          const pct=serials.length?Math.round(completed/serials.length*100):0;
          const proj=projects.find(p=>p.id===o.projectId);
          const openDef=(o.defects||[]).filter(d=>d.status!=="closed").length;
          return(
            <div key={o.id} style={{background:"var(--c-card)",borderRadius:10,padding:"12px 14px",border:"1px solid var(--c-border)",cursor:"pointer",transition:"border-color .15s"}}
              onClick={()=>setDetail(o)}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--c-accent)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--c-border)"}
            >
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:15}}>{o.woNumber}</span>
                  {o.pn&&<span style={{fontSize:11,color:"#a78bfa"}}>P/N: {o.pn}</span>}
                  {proj&&<span style={{fontSize:11,background:"var(--c-tag-blue-bg)",color:"var(--c-tag-blue)",padding:"2px 7px",borderRadius:20}}>{proj.name}</span>}
                  {openDef>0&&<span style={{fontSize:11,background:"#450a0a",color:"#fca5a5",padding:"2px 7px",borderRadius:20}}>🔧 {openDef}</span>}
                </div>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:700,color:pct>=100?"#10b981":"var(--c-muted)"}}>{completed}/{serials.length}</span>
                  {canEdit&&<><IBtn onClick={e=>{e.stopPropagation();setEditing(o);setShowForm(true)}}>✏️</IBtn><IBtn onClick={e=>{e.stopPropagation();del(o.id)}}>🗑️</IBtn></>}
                </div>
              </div>
              {o.description&&<div style={{fontSize:13,color:"var(--c-muted)",marginBottom:4}}>{o.description}</div>}
              <div style={{display:"flex",gap:10,fontSize:12,color:"var(--c-dim)",marginBottom:5,flexWrap:"wrap"}}>
                <span>יחידות: <b style={{color:"var(--c-text)"}}>{serials.length}</b></span>
                {canEdit&&<span>מחיר: <b style={{color:"#a78bfa"}}>{fmtMoney(o.unitPrice)}</b></span>}
                <span>שלבים: <b>{(o.stageIds||[]).length}</b></span>
              </div>
              <PBar pct={pct}/>
            </div>
          );
        })}
      </div>
      {showForm&&(<Modal onClose={()=>setShowForm(false)}><OrderForm initial={editing} projects={projects} stages={stages} stageBlocks={stageBlocks} onSave={data=>{
        const{_serials,...rest}=data;
        if(editing){
          updO(prev=>prev.map(o=>o.id===editing.id?{...editing,...rest}:o));
        }else{
          updO(prev=>[...prev,{...rest,id:uid(),serials:_serials||[],shortages:[],defects:[]}]);
        }
        setShowForm(false);
      }} onClose={()=>setShowForm(false)}/></Modal>)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// ═══ SHORTAGES (חוסרים) ═════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function Shortages({orders,updO,projects}){
  const {canEdit}=useAuth();
  const [filter,setFilter]=useState("open");
  const [filterProj,setFilterProj]=useState("all");
  const [partialModal,setPartialModal]=useState(null);
  const [partialQty,setPartialQty]=useState("");
  const all=orders.flatMap(o=>(o.shortages||[]).map(s=>({...s,order:o,proj:projects.find(p=>p.id===o.projectId)}))).filter(s=>{
    if(filterProj!=="all"&&s.order.projectId!==filterProj)return false;
    return filter==="all"||(filter==="open"&&!s.received)||(filter==="received"&&s.received);
  });
  const markRec=(oid,sid)=>{updO(prev=>prev.map(o=>{if(o.id!==oid)return o;const sh=o.shortages.map(s=>s.id===sid?{...s,received:true,receivedDate:todays(),receivedQty:Number(s.missing||0)}:s);return{...o,shortages:sh}}))};
  const markRecPartial=(oid,sid,qty)=>{updO(prev=>prev.map(o=>{if(o.id!==oid)return o;const sh=o.shortages.map(s=>{if(s.id!==sid)return s;const nq=Number(s.receivedQty||0)+Number(qty),tot=Number(s.missing||0);return{...s,receivedQty:nq,received:tot>0&&nq>=tot,receivedDate:todays()}});return{...o,shortages:sh}}));setPartialModal(null);setPartialQty("")};
  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:10}}>
        <h2 style={{margin:0,fontSize:22,color:"#f87171"}}>⚠️ חוסרים</h2>
        <SegBtn options={[["open","פתוחים"],["received","שהתקבלו"],["all","הכל"]]} value={filter} onChange={setFilter}/>
      </div>
      <Card style={{padding:"10px 14px",marginBottom:12,display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div style={{display:"flex",flexDirection:"column",gap:3,minWidth:160}}><label style={{fontSize:11,color:"var(--c-dim)"}}>פרויקט</label><select value={filterProj} onChange={e=>setFilterProj(e.target.value)} style={{padding:"6px 8px",fontSize:12}}><option value="all">הכל</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
        <div style={{fontSize:12,color:"var(--c-dim)",paddingBottom:4}}>{all.length} חוסרים</div>
      </Card>
      {all.length===0?<div style={{textAlign:"center",padding:60,color:"var(--c-dim)",fontSize:18}}>{filter==="open"?"🎉 אין חוסרים פתוחים!":"אין נתונים"}</div>:(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {all.map(s=>{const rq=Number(s.receivedQty||0),tot=Number(s.missing||0),isPar=rq>0&&!s.received;return(
            <div key={s.id} style={{background:"var(--c-card)",borderRadius:10,padding:"12px 14px",border:`1px solid ${s.received?"#10b98133":isPar?"#f59e0b33":"#ef444433"}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:s.received?"#10b981":isPar?"#f59e0b":"#f87171",marginBottom:3}}>{s.item}{s.sku&&<span style={{fontSize:11,color:"#7eb8ff",marginRight:8,fontWeight:400}}>מק"ט: {s.sku}</span>}</div>
                <div style={{fontSize:12,color:"var(--c-muted)",display:"flex",gap:10,flexWrap:"wrap"}}>
                  <span style={{color:"#60a5fa"}}>{s.order.woNumber}</span>
                  {tot>0&&<span>נדרש: {tot}{isPar?` | התקבל: ${rq}`:""}</span>}
                  <span>הוזמן: {fmt(s.orderedDate)}</span>
                  {s.received&&s.orderedDate&&s.receivedDate&&<span style={{color:"#a78bfa"}}>⏱ {daysBetween(s.orderedDate,s.receivedDate)} ימים</span>}
                </div>
                {(s.reason||s.responsible)&&<div style={{fontSize:11,color:"var(--c-dim)",marginTop:3,display:"flex",gap:10,flexWrap:"wrap"}}>{s.reason&&<span>סיבה: {s.reason}</span>}{s.responsible&&<span style={{color:"#a78bfa"}}>אחראי: {s.responsible}</span>}</div>}
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                {canEdit&&!s.received&&<><Btn color="#f59e0b" small onClick={()=>{setPartialModal({oid:s.order.id,sid:s.id,item:s.item});setPartialQty("")}}>📦 חלקי</Btn><Btn color="#10b981" small onClick={()=>markRec(s.order.id,s.id)}>✅ הכל</Btn></>}
                {s.received?<span style={{fontSize:11,background:"#052e16",color:"#6ee7b7",padding:"3px 9px",borderRadius:20}}>✅ הושלם</span>:isPar?<span style={{fontSize:11,background:"#451a0344",color:"#fbbf24",padding:"3px 9px",borderRadius:20}}>📦 חלקי</span>:<span style={{fontSize:11,background:"#450a0a",color:"#fca5a5",padding:"3px 9px",borderRadius:20}}>❌ ממתין</span>}
              </div>
            </div>
          )})}
        </div>
      )}
      {partialModal&&(<div onClick={()=>setPartialModal(null)} style={{position:"fixed",inset:0,background:"#000c",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div onClick={e=>e.stopPropagation()} style={{background:"var(--c-card)",borderRadius:12,padding:24,minWidth:280,border:"1px solid var(--c-border2)"}}><div style={{fontWeight:700,fontSize:16,marginBottom:12,color:"#f59e0b"}}>📦 קבלה חלקית</div><div style={{fontSize:13,color:"var(--c-muted)",marginBottom:12}}>{partialModal.item}</div><Field label="כמות שהתקבלה" type="number" value={partialQty} onChange={setPartialQty}/><div style={{display:"flex",gap:8,marginTop:14}}><Btn color="#f59e0b" onClick={()=>partialQty&&markRecPartial(partialModal.oid,partialModal.sid,partialQty)}>שמור</Btn><Btn onClick={()=>setPartialModal(null)}>ביטול</Btn></div></div></div>)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// ═══ MY WORK (Worker View) — Enhanced with Break, Bulk, Custom Tasks ════
// ══════════════════════════════════════════════════════════════════════════
function MyWork({orders,stages,workLogs,onStartWork,onEndWork,onPauseWork,onResumeWork,customTasks,onAddTask,onStartTask,onEndTask,onPauseTask,onResumeTask,onDeleteTask}){
  const {currentUser}=useAuth();
  const myAccess=currentUser.stageAccess==="all"?stages.map(s=>s.id):(Array.isArray(currentUser.stageAccess)?currentUser.stageAccess:[]);
  const myActiveLogs=workLogs.filter(w=>w.userId===currentUser.id&&!w.completed);
  const myActiveLog=myActiveLogs[0];
  const [bulkMode,setBulkMode]=useState(false);
  const [bulkSelected,setBulkSelected]=useState([]);
  const [showTaskForm,setShowTaskForm]=useState(false);
  const [taskName,setTaskName]=useState("");
  const [taskDesc,setTaskDesc]=useState("");

  const accessible=orders.filter(o=>(o.stageIds||[]).some(sid=>myAccess.includes(sid)));

  const startWork=(serialId,stageId,orderId)=>{
    if(myActiveLog&&!myActiveLog.paused){alert("יש לך עבודה פעילה. סיים או עצור לפני שמתחיל חדשה.");return}
    const order=orders.find(o=>o.id===orderId);const serial=(order?.serials||[]).find(s=>s.id===serialId);
    onStartWork({id:uid(),userId:currentUser.id,userName:currentUser.name,serialId,stageId,orderId,serialSn:serial?.sn||"",startTime:nowISO(),endTime:null,completed:false,durationMin:0,paused:false,pauseStart:null,totalPauseMin:0,pauseLog:[]});
  };

  const startBulk=(oId,stId)=>{
    if(myActiveLog&&!myActiveLog.paused){alert("יש עבודה פעילה");return}
    const order=orders.find(o=>o.id===oId);
    const groupId=uid();
    bulkSelected.forEach(sId=>{
      const serial=(order?.serials||[]).find(s=>s.id===sId);
      onStartWork({id:uid(),userId:currentUser.id,userName:currentUser.name,serialId:sId,stageId:stId,orderId:oId,serialSn:serial?.sn||"",startTime:nowISO(),endTime:null,completed:false,durationMin:0,paused:false,pauseStart:null,totalPauseMin:0,pauseLog:[],bulk:true,bulkGroupId:groupId,bulkCount:bulkSelected.length});
    });
    setBulkSelected([]);setBulkMode(false);
  };

  const endWork=()=>{
    if(!myActiveLog)return;
    const start=new Date(myActiveLog.startTime);
    let dur=Math.round((Date.now()-start.getTime())/60000);
    dur-=(myActiveLog.totalPauseMin||0);
    if(myActiveLog.paused&&myActiveLog.pauseStart)dur-=Math.round((Date.now()-new Date(myActiveLog.pauseStart).getTime())/60000);
    onEndWork(myActiveLog.id,Math.max(0,dur));
    // If bulk, end all
    myActiveLogs.filter(w=>w.bulk&&w.id!==myActiveLog.id).forEach(w=>{
      let d2=Math.round((Date.now()-new Date(w.startTime).getTime())/60000)-(w.totalPauseMin||0);
      onEndWork(w.id,Math.max(0,d2));
    });
  };

  const togglePause=()=>{
    if(!myActiveLog)return;
    if(myActiveLog.paused){onResumeWork(myActiveLog.id)}
    else{onPauseWork(myActiveLog.id)}
  };

  // My custom tasks
  const myTasks=(customTasks||[]).filter(t=>t.userId===currentUser.id);
  const activeTask=myTasks.find(t=>t.active&&!t.completed);

  const addTask=()=>{if(!taskName.trim())return;onAddTask({id:uid(),userId:currentUser.id,userName:currentUser.name,name:taskName.trim(),description:taskDesc.trim(),createdAt:nowISO(),active:false,completed:false,startTime:null,endTime:null,durationMin:0,paused:false,pauseStart:null,totalPauseMin:0,pauseLog:[]});setTaskName("");setTaskDesc("");setShowTaskForm(false)};

  return(
    <div className="fade-in">
      {currentUser.role==="admin"?(
        <div>
          <h2 style={{margin:"0 0 14px"}}>📡 מצב עבודה בזמן אמת</h2>

          {/* Active workers */}
          {(()=>{
            const activeWork=workLogs.filter(w=>!w.completed);
            const onBreak=activeWork.filter(w=>w.paused);
            const working=activeWork.filter(w=>!w.paused);
            // Pending work: serials not started yet
            const pendingCount=orders.reduce((s,o)=>{
              const oSt=o.stageIds||[];
              return s+(o.serials||[]).filter(sr=>oSt.some(sid=>!workLogs.some(w=>w.serialId===sr.id&&w.stageId===sid&&(w.completed||!w.completed)))).length;
            },0);
            const totalPending=orders.reduce((s,o)=>{
              const oSt=o.stageIds||[];
              return s+(o.serials||[]).filter(sr=>!oSt.every(sid=>workLogs.some(w=>w.serialId===sr.id&&w.stageId===sid&&w.completed))).length;
            },0);

            return(<>
              {/* Group active work by worker, dedupe bulk */}
              {(()=>{
                const seen=new Set();const workerWork={};
                working.forEach(w=>{
                  const key=w.bulkGroupId||w.id;
                  if(seen.has(key))return;seen.add(key);
                  if(!workerWork[w.userId])workerWork[w.userId]={name:w.userName,items:[]};
                  if(w.bulkGroupId){
                    const group=working.filter(g=>g.bulkGroupId===w.bulkGroupId);
                    workerWork[w.userId].items.push({...w,_sns:group.map(g=>g.serialSn),_count:group.length});
                  }else{workerWork[w.userId].items.push({...w,_sns:[w.serialSn],_count:1})}
                });
                const seenB=new Set();const workerBreak={};
                onBreak.forEach(w=>{
                  const key=w.bulkGroupId||w.id;
                  if(seenB.has(key))return;seenB.add(key);
                  if(!workerBreak[w.userId])workerBreak[w.userId]={name:w.userName,items:[]};
                  if(w.bulkGroupId){
                    const group=onBreak.filter(g=>g.bulkGroupId===w.bulkGroupId);
                    workerBreak[w.userId].items.push({...w,_sns:group.map(g=>g.serialSn),_count:group.length});
                  }else{workerBreak[w.userId].items.push({...w,_sns:[w.serialSn],_count:1})}
                });
                const ww=Object.keys(workerWork).length;const bw=Object.keys(workerBreak).length;
                const activeTasks2=(customTasks||[]).filter(t=>t.active&&!t.completed);
                return(<>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:14}}>
                <KpiBox i="🔄" v={ww} label="עובדים בעבודה" c="#f59e0b"/>
                <KpiBox i="⏸️" v={bw} label="בהפסקה" c="#8b95a8"/>
                <KpiBox i="📋" v={totalPending} label="יחידות ממתינות" c="#3b82f6"/>
                <KpiBox i="📦" v={orders.filter(o=>(o.serials||[]).length>0&&(o.serials||[]).some(sr=>!(o.stageIds||[]).every(sid=>workLogs.some(w2=>w2.serialId===sr.id&&w2.stageId===sid&&w2.completed)))).length} label='פק\"ע בתהליך' c="#06b6d4"/>
              </div>
              {ww>0&&(<Card style={{marginBottom:12,border:"2px solid #f59e0b33"}}><div style={{fontWeight:700,fontSize:15,color:"#f59e0b",marginBottom:10}}>🔄 עובדים בעבודה ({ww})</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{Object.values(workerWork).flatMap(wk=>wk.items.map(w=>{const stage=stages.find(s2=>s2.id===w.stageId);const order=orders.find(o=>o.id===w.orderId);return(<div key={w.id} style={{background:"var(--c-deep)",borderRadius:10,padding:"10px 14px",border:"1px solid #f59e0b22",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div><span style={{fontWeight:700,fontSize:14}}>{w.userName}</span><span style={{fontSize:12,color:"#60a5fa",marginRight:8}}>← {order?.woNumber||""}</span>{w._count>1?<span style={{fontSize:11,background:"#3b82f622",color:"#60a5fa",padding:"2px 8px",borderRadius:10}}>{w._count} יחידות</span>:<span style={{fontSize:12,color:"#7eb8ff"}}>{w.serialSn}</span>}<span style={{fontSize:11,color:stage?.color||"var(--c-muted)",marginRight:6}}>/ {stage?.name||""}</span></div><ActiveTimer startTime={w.startTime} pauseMin={w.totalPauseMin||0}/></div>)}))}</div></Card>)}
              {bw>0&&(<Card style={{marginBottom:12,border:"1px solid #8b95a833"}}><div style={{fontWeight:700,fontSize:15,color:"#8b95a8",marginBottom:10}}>⏸️ בהפסקה ({bw})</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{Object.values(workerBreak).flatMap(wk=>wk.items.map(w=>{const stage=stages.find(s2=>s2.id===w.stageId);return(<div key={w.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",opacity:.7}}><div><span style={{fontWeight:600}}>{w.userName}</span>{w._count>1?<span style={{fontSize:11,color:"var(--c-dim)",marginRight:8}}>{w._count} יחידות / {stage?.name||""}</span>:<span style={{fontSize:12,color:"var(--c-dim)",marginRight:8}}>{w.serialSn} / {stage?.name||""}</span>}</div><span style={{fontSize:12,color:"#8b95a8"}}>⏸️ {w.pauseStart?fmtTime(Math.round((Date.now()-new Date(w.pauseStart).getTime())/60000)):""}</span></div>)}))}</div></Card>)}
              {activeTasks2.length>0&&(<Card style={{marginBottom:12,border:"1px solid #a78bfa33"}}><div style={{fontWeight:700,fontSize:15,color:"#a78bfa",marginBottom:10}}>📌 עובדים על משימות</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{activeTasks2.map(t=>(<div key={t.id} style={{background:"var(--c-deep)",borderRadius:10,padding:"10px 14px",border:t.paused?"1px solid #8b95a833":"1px solid #a78bfa22",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}><div><span style={{fontWeight:700}}>{t.userName}</span><span style={{fontSize:12,color:"#a78bfa",marginRight:8}}>← {t.name}</span>{t.paused&&<span style={{fontSize:11,color:"#8b95a8"}}>⏸️</span>}</div>{!t.paused?<ActiveTimer startTime={t.startTime} pauseMin={t.totalPauseMin||0}/>:<span style={{fontSize:14,color:"#8b95a8"}}>⏸️</span>}</div>))}</div></Card>)}
              {ww===0&&bw===0&&activeTasks2.length===0&&(<Card style={{marginBottom:12,textAlign:"center",padding:30,color:"var(--c-dim)"}}><div style={{fontSize:36,marginBottom:8}}>😴</div>אין עבודה פעילה כרגע</Card>)}
                </>)})()}


              {/* Remaining work summary */}
              <Card style={{marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>📋 עבודה שנותרה</div>
                <div style={{overflowX:"auto"}}><table><thead><tr><th>פק"ע</th><th>P/N</th><th>יחידות</th><th>הושלמו</th><th>בתהליך</th><th>נותרו</th><th>התקדמות</th></tr></thead><tbody>
                  {orders.filter(o=>(o.serials||[]).length>0).map(o=>{
                    const sers=o.serials||[];const oSt=o.stageIds||[];
                    const done=sers.filter(sr=>oSt.every(sid=>workLogs.some(w=>w.serialId===sr.id&&w.stageId===sid&&w.completed))).length;
                    const inProg=sers.filter(sr=>workLogs.some(w=>w.serialId===sr.id&&!w.completed)).length;
                    const remain=sers.length-done;
                    const pct=sers.length?Math.round(done/sers.length*100):0;
                    if(done===sers.length)return null;
                    return(<tr key={o.id}><td style={{fontWeight:600,color:"#60a5fa"}}>{o.woNumber}</td><td style={{fontSize:12,color:"#a78bfa"}}>{o.pn||"—"}</td><td>{sers.length}</td><td style={{color:"#10b981"}}>{done}</td><td style={{color:"#f59e0b"}}>{inProg}</td><td style={{fontWeight:700}}>{remain}</td><td style={{minWidth:80}}><PBar pct={pct} h={6}/><span style={{fontSize:10,color:"var(--c-dim)"}}>{pct}%</span></td></tr>);
                  })}
                </tbody></table></div>
              </Card>
            </>);
          })()}

          {/* Admin tasks section */}
          <Card style={{marginBottom:14,border:"1px solid #a78bfa33"}}>
            <div style={{fontWeight:700,fontSize:15,color:"#a78bfa",marginBottom:10}}>📌 משימות שהקצתי</div>
            {(customTasks||[]).filter(t=>!t.completed).length===0?<div style={{color:"var(--c-dim)",fontSize:12,textAlign:"center",padding:10}}>אין משימות פתוחות</div>:(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {(customTasks||[]).filter(t=>!t.completed).map(t=>(
                  <div key={t.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"10px 12px",border:t.active?"1px solid #a78bfa":"1px solid var(--c-border)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                      <div><span style={{fontWeight:600}}>{t.name}</span><span style={{fontSize:11,color:"#60a5fa",marginRight:8}}>→ {t.userName}</span>{t.price>0&&<span style={{fontSize:11,color:"#a78bfa"}}>₪{t.price}</span>}{t.active&&<span style={{fontSize:11,background:t.paused?"#8b95a822":"#a78bfa22",color:t.paused?"#8b95a8":"#a78bfa",padding:"2px 6px",borderRadius:10,marginRight:6}}>{t.paused?"⏸️ הפסקה":"🔄 בביצוע"}</span>}</div>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:11,color:"var(--c-dim)"}}>{fmt(t.createdAt?.slice(0,10))}</span><IBtn onClick={()=>{if(confirm("למחוק משימה?"))onDeleteTask(t.id)}}>🗑️</IBtn></div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {(customTasks||[]).filter(t=>t.completed).length>0&&(
              <div style={{marginTop:8,borderTop:"1px solid var(--c-border)",paddingTop:8}}>
                <div style={{fontSize:11,color:"var(--c-dim)",marginBottom:4}}>הושלמו:</div>
                {(customTasks||[]).filter(t=>t.completed).slice(0,8).map(t=>(
                  <div key={t.id} style={{fontSize:12,color:"var(--c-muted)",padding:"2px 0",display:"flex",gap:8,alignItems:"center"}}>
                    <span>✅ {t.name}</span><span style={{color:"#60a5fa"}}>{t.userName}</span><span style={{color:"#a78bfa"}}>{fmtTime(t.durationMin)}</span>{t.price>0&&<span style={{color:"#10b981"}}>₪{t.price}</span>}<IBtn onClick={()=>onDeleteTask(t.id)}>🗑️</IBtn>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      ):(
      <div>
      <h2 style={{margin:"0 0 14px"}}>🔨 העבודה שלי</h2>

      {/* Active Work */}
      {myActiveLog&&(
        <Card style={{marginBottom:14,border:`2px solid ${myActiveLog.paused?"#8b95a8":"#f59e0b"}`,background:myActiveLog.paused?"var(--c-card)":"linear-gradient(135deg,var(--c-card),#1a1800)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:12,color:myActiveLog.paused?"#8b95a8":"#f59e0b",fontWeight:700,marginBottom:4}}>{myActiveLog.paused?"⏸️ בהפסקה":"⏱️ עובד כרגע:"}{myActiveLogs.length>1&&<span style={{marginRight:6,fontSize:11,background:"#3b82f622",color:"#60a5fa",padding:"2px 8px",borderRadius:12}}>×{myActiveLogs.length} יחידות</span>}</div>
              <div style={{fontWeight:700,fontSize:16}}>{myActiveLog.serialSn}{myActiveLogs.length>1&&` + ${myActiveLogs.length-1}`}</div>
              <div style={{fontSize:13,color:"var(--c-muted)"}}>{stages.find(s=>s.id===myActiveLog.stageId)?.name}</div>
              <div style={{fontSize:12,color:"var(--c-dim)",marginTop:4}}>התחלה: {new Date(myActiveLog.startTime).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})}</div>
              {(myActiveLog.totalPauseMin>0||(myActiveLog.pauseLog||[]).length>0)&&<div style={{fontSize:11,color:"#8b95a8",marginTop:2}}>הפסקות: {fmtTime(myActiveLog.totalPauseMin||0)} ({(myActiveLog.pauseLog||[]).length} פעמים)</div>}
              {!myActiveLog.paused&&<ActiveTimer startTime={myActiveLog.startTime} pauseMin={myActiveLog.totalPauseMin||0}/>}
              {myActiveLog.paused&&<div style={{fontSize:22,fontWeight:800,color:"#8b95a8",marginTop:6}}>⏸️ מושהה</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Btn color={myActiveLog.paused?"#3b82f6":"#f97316"} onClick={togglePause} style={{fontSize:14,padding:"10px 20px"}}>{myActiveLog.paused?"▶️ חזור לעבודה":"⏸️ הפסקה"}</Btn>
              <Btn color="#10b981" onClick={endWork} style={{fontSize:16,padding:"12px 24px"}}>✅ סיימתי</Btn>
            </div>
          </div>
        </Card>
      )}

      {/* Active Custom Task */}
      {activeTask&&(
        <Card style={{marginBottom:14,border:`2px solid ${activeTask.paused?"#8b95a8":"#a78bfa"}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:12,color:activeTask.paused?"#8b95a8":"#a78bfa",fontWeight:700,marginBottom:4}}>{activeTask.paused?"⏸️ משימה בהפסקה":"📌 משימה פעילה:"}</div>
              <div style={{fontWeight:700,fontSize:16}}>{activeTask.name}</div>
              {activeTask.description&&<div style={{fontSize:12,color:"var(--c-muted)"}}>{activeTask.description}</div>}
              {(activeTask.totalPauseMin>0||(activeTask.pauseLog||[]).length>0)&&<div style={{fontSize:11,color:"#8b95a8",marginTop:2}}>הפסקות: {fmtTime(activeTask.totalPauseMin||0)} ({(activeTask.pauseLog||[]).length})</div>}
              {!activeTask.paused&&<ActiveTimer startTime={activeTask.startTime} pauseMin={activeTask.totalPauseMin||0}/>}
              {activeTask.paused&&<div style={{fontSize:22,fontWeight:800,color:"#8b95a8",marginTop:6}}>⏸️ מושהה</div>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Btn color={activeTask.paused?"#3b82f6":"#f97316"} onClick={()=>activeTask.paused?onResumeTask(activeTask.id):onPauseTask(activeTask.id)} style={{fontSize:14,padding:"10px 20px"}}>{activeTask.paused?"▶️ חזור":"⏸️ הפסקה"}</Btn>
              <Btn color="#10b981" onClick={()=>onEndTask(activeTask.id)} style={{fontSize:16,padding:"12px 24px"}}>✅ סיימתי</Btn>
            </div>
          </div>
        </Card>
      )}

      {/* Custom Tasks Section — different view for admin vs worker */}
      <Card style={{marginBottom:14,border:"1px solid #a78bfa33"}}>
        {currentUser.role==="admin"?(
          <div>
            <div style={{fontWeight:700,fontSize:15,color:"#a78bfa",marginBottom:10}}>📌 משימות שהקצתי</div>
            {(customTasks||[]).filter(t=>!t.completed).length===0?<div style={{color:"var(--c-dim)",fontSize:12,textAlign:"center",padding:10}}>אין משימות פתוחות</div>:(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {(customTasks||[]).filter(t=>!t.completed).map(t=>(
                  <div key={t.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"10px 12px",border:t.active?"1px solid #a78bfa":"1px solid var(--c-border)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                      <div>
                        <span style={{fontWeight:600,fontSize:13}}>{t.name}</span>
                        <span style={{fontSize:11,color:"#60a5fa",marginRight:8}}>→ {t.userName}</span>
                        {t.price>0&&<span style={{fontSize:11,color:"#a78bfa",marginRight:6}}>₪{t.price}</span>}
                        {t.active&&<span style={{fontSize:11,background:"#a78bfa22",color:"#a78bfa",padding:"2px 6px",borderRadius:10}}>🔄 בביצוע</span>}
                      </div>
                      <span style={{fontSize:11,color:"var(--c-dim)"}}>{fmt(t.createdAt?.slice(0,10))}</span>
                    </div>
                    {t.description&&<div style={{fontSize:11,color:"var(--c-muted)",marginTop:4}}>{t.description}</div>}
                  </div>
                ))}
              </div>
            )}
            {(customTasks||[]).filter(t=>t.completed).length>0&&(
              <div style={{marginTop:10,borderTop:"1px solid var(--c-border)",paddingTop:8}}>
                <div style={{fontSize:11,color:"var(--c-dim)",marginBottom:6}}>הושלמו:</div>
                {(customTasks||[]).filter(t=>t.completed).slice(0,8).map(t=>(
                  <div key={t.id} style={{fontSize:12,color:"var(--c-muted)",padding:"3px 0",display:"flex",gap:10,flexWrap:"wrap"}}>
                    <span>✅ {t.name}</span><span style={{color:"#60a5fa"}}>{t.userName}</span><span style={{color:"#a78bfa"}}>{fmtTime(t.durationMin)}</span>{t.price>0&&<span style={{color:"#10b981"}}>₪{t.price}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        ):(
          <div>
            <div style={{fontWeight:700,fontSize:15,color:"#a78bfa",marginBottom:10}}>📌 משימות שהוקצו לי</div>
            {myTasks.filter(t=>!t.completed).length===0?<div style={{color:"var(--c-dim)",fontSize:12,textAlign:"center",padding:10}}>אין משימות</div>:(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {myTasks.filter(t=>!t.completed).map(t=>(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--c-deep)",borderRadius:8,padding:"8px 12px",border:t.active?"1px solid #a78bfa":"1px solid var(--c-border)"}}>
                    <div>
                      <span style={{fontWeight:600,fontSize:13}}>{t.name}</span>
                      {t.description&&<span style={{fontSize:11,color:"var(--c-dim)",marginRight:6}}> — {t.description}</span>}
                      {t.price>0&&<span style={{fontSize:11,color:"#a78bfa",marginRight:6}}>₪{t.price}</span>}
                      {t.active&&<span style={{fontSize:11,color:"#a78bfa",marginRight:6}}>🔄 פעיל</span>}
                    </div>
                    {!t.active?<Btn color="#a78bfa" small onClick={()=>onStartTask(t.id)} disabled={!!activeTask||!!myActiveLog}>▶️ התחל</Btn>:<Btn color="#10b981" small onClick={()=>onEndTask(t.id)}>✅ סיים</Btn>}
                  </div>
                ))}
              </div>
            )}
            {myTasks.filter(t=>t.completed).length>0&&(
              <div style={{marginTop:10,borderTop:"1px solid var(--c-border)",paddingTop:8}}>
                <div style={{fontSize:11,color:"var(--c-dim)",marginBottom:6}}>הושלמו:</div>
                {myTasks.filter(t=>t.completed).slice(0,5).map(t=>(
                  <div key={t.id} style={{fontSize:12,color:"var(--c-muted)",padding:"3px 0",display:"flex",gap:10}}>
                    <span>✅ {t.name}</span><span style={{color:"#a78bfa"}}>{fmtTime(t.durationMin)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </Card>

      {/* Bulk mode toggle */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <Btn color={bulkMode?"#ef4444":"#374151"} small onClick={()=>{setBulkMode(p=>!p);setBulkSelected([])}}>{bulkMode?"✕ בטל מצב קבוצתי":"📦 הפעלת טיימר קבוצתי"}</Btn>
      </div>

      {/* Available Work */}
      {accessible.map(o=>{
        // ALL stages in order (not just worker's access)
        const allStagesOrdered=(o.stageIds||[]).map(sid=>stages.find(s=>s.id===sid)).filter(Boolean).sort((a,b)=>a.order-b.order);
        // For each serial, find its true next stage (respecting order)
        const pendingSerials=(o.serials||[]).filter(s=>{
          // Find the first uncompleted stage for this serial
          const nextSt=allStagesOrdered.find(st=>!workLogs.some(w=>w.serialId===s.id&&w.stageId===st.id&&w.completed));
          if(!nextSt)return false; // all stages done
          // Worker can only see if the next stage is one they have access to
          return myAccess.includes(nextSt.id)&&!workLogs.some(w=>w.serialId===s.id&&w.stageId===nextSt.id&&!w.completed);
        });
        if(pendingSerials.length===0)return null;
        // For bulk: find common next stage
        const commonStage=allStagesOrdered.find(st=>myAccess.includes(st.id)&&pendingSerials.some(s=>{const ns=allStagesOrdered.find(st2=>!workLogs.some(w=>w.serialId===s.id&&w.stageId===st2.id&&w.completed));return ns?.id===st.id}));
        return(
          <Card key={o.id} style={{marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,color:"#60a5fa"}}>{o.woNumber}</span>
              {o.pn&&<span style={{fontSize:12,color:"#a78bfa"}}>P/N: {o.pn}</span>}
              <span style={{fontSize:11,color:"var(--c-dim)"}}>({pendingSerials.length} ממתינות)</span>
              {bulkMode&&commonStage&&bulkSelected.length>0&&<Btn color={commonStage.color} small onClick={()=>startBulk(o.id,commonStage.id)}>▶️ התחל {bulkSelected.length} יחידות — {commonStage.name}</Btn>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pendingSerials.slice(0,15).map(s=>{
                const nextStage=allStagesOrdered.find(st=>!workLogs.some(w=>w.serialId===s.id&&w.stageId===st.id&&w.completed));
                if(!nextStage||!myAccess.includes(nextStage.id))return null;
                const isSel=bulkSelected.includes(s.id);
                return(
                  <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:isSel?"#3b82f611":"var(--c-deep)",borderRadius:8,padding:"8px 12px",border:isSel?"1px solid #3b82f6":"1px solid transparent"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {bulkMode&&<input type="checkbox" checked={isSel} onChange={e=>{setBulkSelected(p=>e.target.checked?[...p,s.id]:p.filter(x=>x!==s.id))}}/>}
                      <span style={{fontWeight:600,fontSize:13}}>{s.sn}</span>
                      <span style={{fontSize:11,color:nextStage.color}}>← {nextStage.name}</span>
                    </div>
                    {!bulkMode&&<Btn color={nextStage.color} small onClick={()=>startWork(s.id,nextStage.id,o.id)} disabled={!!(myActiveLog&&!myActiveLog.paused)}>▶️ התחל</Btn>}
                  </div>
                );
              })}
              {pendingSerials.length>15&&<div style={{fontSize:12,color:"var(--c-dim)",textAlign:"center"}}>ועוד {pendingSerials.length-15}...</div>}
            </div>
          </Card>
        );
      })}
      {!myActiveLog&&!activeTask&&accessible.every(o=>{
        const oSt=(o.stageIds||[]).filter(sid=>myAccess.includes(sid));
        return(o.serials||[]).every(s=>oSt.every(st=>workLogs.some(w=>w.serialId===s.id&&w.stageId===st.id&&w.completed)));
      })&&<div style={{textAlign:"center",padding:40,color:"var(--c-dim)"}}>🎉 אין עבודה ממתינה!</div>}
    </div>
      )}
    </div>
  );
}

function ActiveTimer({startTime,pauseMin=0}){
  const[e2,setE]=useState(0);
  useEffect(()=>{const t=setInterval(()=>{setE(Math.max(0,Math.round((Date.now()-new Date(startTime).getTime())/1000)-pauseMin*60))},1000);return()=>clearInterval(t)},[startTime,pauseMin]);
  const h=Math.floor(e2/3600),m=Math.floor((e2%3600)/60),s=e2%60;
  return<div style={{fontSize:22,fontWeight:800,color:"#f59e0b",marginTop:6,fontVariantNumeric:"tabular-nums"}}>{String(h).padStart(2,"0")}:{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</div>;
}

// ══════════════════════════════════════════════════════════════════════════
// ═══ WORKERS DASHBOARD ══════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function WorkersDashboard({users,workLogs,orders,stages,customTasks,onAddTask}){
  const [search,setSearch]=useState("");
  const [period,setPeriod]=useState("all");
  const workers=users.filter(u=>u.role!=="admin"&&u.active!==false);
  const filtered=workers.filter(w=>!search||w.name.includes(search));
  // Task management
  const [showTaskForm,setShowTaskForm]=useState(false);
  const [taskName,setTaskName]=useState("");
  const [taskDesc,setTaskDesc]=useState("");
  const [taskWorker,setTaskWorker]=useState("");
  const [taskPrice,setTaskPrice]=useState("");

  // Period filter for logs
  const filterByPeriod=(dateStr)=>{
    if(period==="all"||!dateStr)return true;
    const d=new Date(dateStr);const now=new Date();
    if(period==="today")return d.toDateString()===now.toDateString();
    if(period==="week"){const week=7*864e5;return(now-d)<week}
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="quarter"){const q=Math.floor(now.getMonth()/3);return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear()}
    if(period==="year")return d.getFullYear()===now.getFullYear();
    return true;
  };

  const workerData=filtered.map(u=>{
    const logs=workLogs.filter(w=>w.userId===u.id&&w.completed&&w.durationMin&&filterByPeriod(w.endTime));
    const totalMin=logs.reduce((s,w)=>s+w.durationMin,0);
    const units=logs.length;
    const rate=Number(u.hourlyRate||0);
    const cost=totalMin*(rate/60);
    const revenue=logs.reduce((s,w)=>{const o=orders.find(o2=>(o2.serials||[]).some(sr=>sr.id===w.serialId));return s+Number(o?.unitPrice||0)},0);
    const totalBreaks=logs.reduce((s,w)=>s+((w.pauseLog||[]).length),0);
    const totalBreakMin=logs.reduce((s,w)=>s+(w.totalPauseMin||0),0);
    const active=workLogs.find(w=>w.userId===u.id&&!w.completed);
    const myTasks=(customTasks||[]).filter(t=>t.userId===u.id);
    const completedTasks=myTasks.filter(t=>t.completed&&filterByPeriod(t.endTime));
    const taskMin=completedTasks.reduce((s,t)=>s+(t.durationMin||0),0);
    return{...u,totalMin,units,cost,revenue,profit:revenue-cost,uph:totalMin>0?(units/(totalMin/60)):0,active,totalBreaks,totalBreakMin,completedTasks:completedTasks.length,taskMin};
  });

  const addTask=()=>{
    if(!taskName.trim()||!taskWorker)return alert("יש לבחור עובד ושם משימה");
    const u=users.find(u2=>u2.id===taskWorker);
    // Use the onAddTask from App (passed via customTasks handler)
    const task={id:uid(),userId:taskWorker,userName:u?.name||"",name:taskName.trim(),description:taskDesc.trim(),price:Number(taskPrice)||0,createdAt:nowISO(),active:false,completed:false,startTime:null,endTime:null,durationMin:0,paused:false,pauseStart:null,totalPauseMin:0,pauseLog:[]};
    onAddTask(task);
    setTaskName("");setTaskDesc("");setTaskWorker("");setTaskPrice("");setShowTaskForm(false);
  };

  return(
    <div className="fade-in">
      <h2 style={{margin:"0 0 14px"}}>👥 ביצועי עובדים</h2>
      <Card style={{padding:"12px 14px",marginBottom:12,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{display:"flex",flexDirection:"column",gap:3,flex:"1 1 160px"}}>
          <label style={{fontSize:11,color:"var(--c-dim)"}}>חיפוש עובד</label>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="הקלד שם..."/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <label style={{fontSize:11,color:"var(--c-dim)"}}>תקופה</label>
          <SegBtn options={[["all","הכל"],["today","היום"],["week","שבוע"],["month","חודש"],["quarter","רבעון"],["year","שנה"]]} value={period} onChange={setPeriod}/>
        </div>
      </Card>

      {/* Add Task for worker (admin only) */}
      <Card style={{marginBottom:14,border:"1px solid #a78bfa33"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <h3 style={{margin:0,fontSize:15,color:"#a78bfa"}}>📌 הקצאת משימה לעובד</h3>
          <Btn color="#a78bfa" small onClick={()=>setShowTaskForm(p=>!p)}>+ משימה חדשה</Btn>
        </div>
        {showTaskForm&&(
          <div style={{background:"var(--c-deep)",borderRadius:8,padding:12,marginBottom:10,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:140}}>
              <label style={{fontSize:11,color:"var(--c-dim)",fontWeight:600}}>עובד *</label>
              <select value={taskWorker} onChange={e=>setTaskWorker(e.target.value)}>
                <option value="">-- בחר עובד --</option>
                {workers.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
              </select>
            </div>
            <Field label="שם משימה *" value={taskName} onChange={setTaskName} style={{minWidth:160}}/>
            <Field label="תיאור" value={taskDesc} onChange={setTaskDesc} style={{minWidth:200}}/>
            <Field label="תמחור ₪" type="number" value={taskPrice} onChange={setTaskPrice} style={{minWidth:80}}/>
            <Btn color="#a78bfa" onClick={addTask} small>הקצה</Btn>
            <Btn onClick={()=>setShowTaskForm(false)} small>ביטול</Btn>
          </div>
        )}
      </Card>

      {/* Worker cards with detailed stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10,marginBottom:14}}>
        {workerData.map(w=>(
          <Card key={w.id} style={{border:w.active?`2px solid #f59e0b`:"1px solid var(--c-border)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:15}}>{w.name}</div>
              {w.active&&<span style={{fontSize:11,background:"#f59e0b22",color:"#f59e0b",padding:"3px 8px",borderRadius:12,animation:"pulse 1.5s infinite"}}>🔄 עובד</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              <div style={{background:"var(--c-deep)",borderRadius:6,padding:"6px 8px"}}><div style={{fontSize:10,color:"var(--c-dim)"}}>יחידות</div><div style={{fontWeight:700,color:"#60a5fa"}}>{w.units}</div></div>
              <div style={{background:"var(--c-deep)",borderRadius:6,padding:"6px 8px"}}><div style={{fontSize:10,color:"var(--c-dim)"}}>יח'/שעה</div><div style={{fontWeight:700,color:"#06b6d4"}}>{w.uph.toFixed(1)}</div></div>
              <div style={{background:"var(--c-deep)",borderRadius:6,padding:"6px 8px"}}><div style={{fontSize:10,color:"var(--c-dim)"}}>שעות</div><div style={{fontWeight:700}}>{fmtTime(w.totalMin)}</div></div>
              <div style={{background:"var(--c-deep)",borderRadius:6,padding:"6px 8px"}}><div style={{fontSize:10,color:"var(--c-dim)"}}>הפסקות</div><div style={{fontWeight:700,color:"#f97316"}}>{w.totalBreaks} ({fmtTime(w.totalBreakMin)})</div></div>
              <div style={{background:"var(--c-deep)",borderRadius:6,padding:"6px 8px"}}><div style={{fontSize:10,color:"var(--c-dim)"}}>משימות</div><div style={{fontWeight:700,color:"#a78bfa"}}>{w.completedTasks}</div></div>
              <div style={{background:"var(--c-deep)",borderRadius:6,padding:"6px 8px"}}><div style={{fontSize:10,color:"var(--c-dim)"}}>רווח</div><div style={{fontWeight:700,color:w.profit>=0?"#10b981":"#ef4444"}}>{fmtMoney(w.profit)}</div></div>
            </div>
            {w.hourlyRate>0&&<div style={{fontSize:11,color:"var(--c-dim)",marginTop:6}}>תעריף: {fmtMoney(w.hourlyRate)}/שעה | עלות: {fmtMoney(w.cost)} | הכנסה: {fmtMoney(w.revenue)}</div>}
          </Card>
        ))}
      </div>

      {/* Recent activity table — filtered by search */}
      <Card>
        <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📋 פעילות אחרונה{search?` — ${search}`:""}</div>
        <div style={{overflowX:"auto"}}><table><thead><tr><th>עובד</th><th>S/N</th><th>שלב</th><th>זמן כולל</th><th>ליחידה</th><th>תמחור</th><th>הפסקות</th><th>סיום</th></tr></thead><tbody>
          {(()=>{
            const logs=workLogs.filter(w=>w.completed&&filterByPeriod(w.endTime)&&(!search||w.userName.includes(search))).sort((a,b)=>(b.endTime||"").localeCompare(a.endTime||""));
            // Group by bulkGroupId
            const seen=new Set();const rows=[];
            logs.forEach(w=>{
              if(w.bulkGroupId){
                if(seen.has(w.bulkGroupId))return;
                seen.add(w.bulkGroupId);
                const group=logs.filter(l=>l.bulkGroupId===w.bulkGroupId);
                const sns=group.map(l=>l.serialSn).join(", ");
                rows.push({...w,_sns:sns,_count:group.length,_grouped:true});
              }else{
                rows.push({...w,_sns:w.serialSn,_count:1,_grouped:false});
              }
            });
            return rows.slice(0,50).map(w=>{
              const stage=stages.find(s=>s.id===w.stageId);
              const stagePrice=Number(stage?.price||0);
              const perUnit=w._count>1?Math.round(w.durationMin/w._count):w.durationMin;
              return(
                <tr key={w.id}>
                  <td style={{fontWeight:600}}>{w.userName}</td>
                  <td style={{color:"#7eb8ff",fontSize:12}}>{w._count>1?<span>{w._count} יחידות<div style={{fontSize:10,color:"var(--c-dim)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w._sns}</div></span>:w._sns}</td>
                  <td><span style={{color:stage?.color||"var(--c-muted)"}}>{stage?.name||"—"}</span></td>
                  <td style={{fontWeight:w._count>1?700:400}}>{fmtTime(w.durationMin)}</td>
                  <td style={{color:w._count>1?"#06b6d4":"var(--c-dim)"}}>{w._count>1?fmtTime(perUnit):"—"}</td>
                  <td style={{color:stagePrice?"#a78bfa":"var(--c-dim)"}}>{stagePrice?`₪${stagePrice}${w._count>1?` × ${w._count} = ₪${stagePrice*w._count}`:""}`:"—"}</td>
                  <td style={{color:"#f97316"}}>{(w.pauseLog||[]).length>0?`${(w.pauseLog||[]).length} (${fmtTime(w.totalPauseMin||0)})`:"—"}</td>
                  <td style={{fontSize:11,color:"var(--c-dim)"}}>{w.endTime?new Date(w.endTime).toLocaleString("he-IL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):""}</td>
                </tr>);
            });
          })()}
        </tbody></table></div>
      </Card>

      {/* Completed custom tasks */}
      {(()=>{const dTasks=(customTasks||[]).filter(t=>t.completed&&filterByPeriod(t.endTime)&&(!search||t.userName.includes(search)));return dTasks.length>0&&(
        <Card style={{marginTop:12}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📌 משימות שבוצעו{search?` — ${search}`:""}</div>
          <div style={{overflowX:"auto"}}><table><thead><tr><th>עובד</th><th>משימה</th><th>זמן נטו</th><th>הפסקות</th><th>תמחור</th><th>סיום</th><th></th></tr></thead><tbody>
            {dTasks.sort((a,b)=>(b.endTime||"").localeCompare(a.endTime||"")).slice(0,30).map(t=>(
              <tr key={t.id}>
                <td style={{fontWeight:600}}>{t.userName}</td>
                <td style={{color:"#a78bfa"}}>{t.name}</td>
                <td>{fmtTime(t.durationMin)}</td>
                <td style={{color:"#f97316"}}>{(t.pauseLog||[]).length>0?`${(t.pauseLog||[]).length} (${fmtTime(t.totalPauseMin||0)})`:"—"}</td>
                <td style={{color:t.price?"#10b981":"var(--c-dim)"}}>{t.price?fmtMoney(t.price):"—"}</td>
                <td style={{fontSize:11,color:"var(--c-dim)"}}>{t.endTime?new Date(t.endTime).toLocaleString("he-IL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):""}</td>
                <td><IBtn onClick={()=>{if(confirm("למחוק?"))onAddTask&&window.dispatchEvent(new CustomEvent("deleteTask",{detail:t.id}))}}>🗑️</IBtn></td>
              </tr>
            ))}
          </tbody></table></div>
        </Card>
      )})()}
    </div>
  );
}

// ═══ STAGES MANAGEMENT ══════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function StagesManagement({stages,setStages,stageBlocks,setStageBlocks,persist}){
  const [showForm,setShowForm]=useState(false);
  const [name,setName]=useState("");
  const [color,setColor]=useState("#3b82f6");
  const [price,setPrice]=useState(0);
  const [editId,setEditId]=useState(null);
  const [editPrice,setEditPrice]=useState(0);
  // Block management
  const [showBlockForm,setShowBlockForm]=useState(false);
  const [blockName,setBlockName]=useState("");
  const [blockStages,setBlockStages]=useState([]);
  const [editBlockId,setEditBlockId]=useState(null);

  const add=()=>{
    if(!name.trim())return;
    const maxOrder=stages.reduce((m,s)=>Math.max(m,s.order||0),0);
    const ns=[...stages,{id:uid(),name:name.trim(),order:maxOrder+1,color,price:Number(price)||0}];
    setStages(ns);persist(null,null,ns);setName("");setPrice(0);setShowForm(false);
  };
  const del=id=>{if(!confirm("למחוק?"))return;const ns=stages.filter(s=>s.id!==id);setStages(ns);persist(null,null,ns)};
  const move=(id,dir)=>{const idx=stages.findIndex(s=>s.id===id);if((dir===-1&&idx===0)||(dir===1&&idx===stages.length-1))return;const arr=[...stages];[arr[idx],arr[idx+dir]]=[arr[idx+dir],arr[idx]];arr.forEach((s,i)=>s.order=i+1);setStages(arr);persist(null,null,arr)};
  const savePrice=(id)=>{const ns=stages.map(s=>s.id===id?{...s,price:Number(editPrice)||0}:s);setStages(ns);persist(null,null,ns);setEditId(null)};

  // Block functions
  const addBlock=()=>{
    if(!blockName.trim()||blockStages.length===0)return alert("יש לתת שם ולבחור לפחות שלב אחד");
    const block={id:uid(),name:blockName.trim(),stages:blockStages.map((bs,i)=>({...bs,id:uid(),order:i+1}))};
    const nb=[...(stageBlocks||[]),block];
    setStageBlocks(nb);LS.set("stageBlocks",nb);persist(null,null,null,null,nb);
    setBlockName("");setBlockStages([]);setShowBlockForm(false);
  };
  const delBlock=id=>{const nb=(stageBlocks||[]).filter(b=>b.id!==id);setStageBlocks(nb);LS.set("stageBlocks",nb);persist(null,null,null,null,nb)};
  const addStageToBlock=stageId=>{
    const st=stages.find(s=>s.id===stageId);if(!st)return;
    if(blockStages.some(bs=>bs.sourceId===stageId))return;
    setBlockStages(p=>[...p,{sourceId:stageId,name:st.name,color:st.color,price:st.price||0}]);
  };
  const updateBlockStagePrice=(idx,pr)=>{setBlockStages(p=>p.map((bs,i)=>i===idx?{...bs,price:Number(pr)||0}:bs))};
  const removeFromBlock=idx=>{setBlockStages(p=>p.filter((_,i)=>i!==idx))};

  return(
    <div className="fade-in">
      <h2 style={{margin:"0 0 14px"}}>🔧 שלבי עבודה ובלוקים</h2>

      {/* Stage Blocks */}
      <Card style={{marginBottom:14,border:"1px solid #8b5cf633"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{margin:0,fontSize:15,color:"#8b5cf6"}}>📦 בלוקים (תבניות שלבים)</h3>
          <Btn color="#8b5cf6" small onClick={()=>{setShowBlockForm(p=>!p);setBlockStages([]);setBlockName("")}}>+ בלוק חדש</Btn>
        </div>
        {showBlockForm&&(
          <div style={{background:"var(--c-deep)",borderRadius:10,padding:14,marginBottom:12,border:"1px solid #8b5cf633"}}>
            <Field label="שם הבלוק *" value={blockName} onChange={setBlockName} style={{marginBottom:10,maxWidth:300}}/>
            <div style={{fontSize:12,color:"var(--c-dim)",fontWeight:600,marginBottom:6}}>בחר שלבים והגדר תמחור לכל שלב:</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {stages.sort((a,b)=>a.order-b.order).map(st=>{
                const inBlock=blockStages.some(bs=>bs.sourceId===st.id);
                return(<button key={st.id} onClick={()=>!inBlock&&addStageToBlock(st.id)} style={{background:inBlock?st.color+"22":"var(--c-card)",border:`1px solid ${inBlock?st.color:  "var(--c-border)"}`,borderRadius:8,padding:"5px 10px",fontSize:12,color:inBlock?st.color:"var(--c-muted)",cursor:inBlock?"default":"pointer",fontFamily:"inherit",opacity:inBlock?.6:1}}>{inBlock?"✓ ":""}{st.name}</button>);
              })}
            </div>
            {blockStages.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
                {blockStages.map((bs,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"var(--c-card)",borderRadius:8,padding:"6px 10px",border:`1px solid ${bs.color}33`}}>
                    <span style={{fontWeight:700,color:bs.color,minWidth:20}}>{i+1}</span>
                    <span style={{fontWeight:600,flex:1}}>{bs.name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <input type="number" value={bs.price} onChange={e=>updateBlockStagePrice(i,e.target.value)} style={{width:70,padding:"3px 6px",fontSize:12}} placeholder="₪"/>
                      <span style={{fontSize:11,color:"var(--c-dim)"}}>₪</span>
                    </div>
                    <IBtn onClick={()=>removeFromBlock(i)}>✕</IBtn>
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:8}}>
              <Btn color="#8b5cf6" onClick={addBlock} small>צור בלוק ({blockStages.length} שלבים)</Btn>
              <Btn onClick={()=>setShowBlockForm(false)} small>ביטול</Btn>
            </div>
          </div>
        )}
        {(stageBlocks||[]).length===0&&!showBlockForm?<div style={{color:"var(--c-dim)",fontSize:12,textAlign:"center",padding:10}}>אין בלוקים — צור בלוק חדש כדי להגדיר תבנית שלבים לפקעות</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {(stageBlocks||[]).map(b=>(
              <div key={b.id} style={{background:"var(--c-deep)",borderRadius:10,padding:"12px 14px",border:"1px solid var(--c-border)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontWeight:700,fontSize:14}}>{b.name}</span>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"var(--c-dim)"}}>{b.stages.length} שלבים</span>
                    <span style={{fontSize:11,color:"#a78bfa"}}>סה"כ: ₪{b.stages.reduce((s,st)=>s+(st.price||0),0)}</span>
                    <IBtn onClick={()=>delBlock(b.id)}>🗑️</IBtn>
                  </div>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {b.stages.sort((a,b2)=>a.order-b2.order).map((st,i)=>(
                    <span key={i} style={{fontSize:11,background:st.color+"22",color:st.color,padding:"3px 8px",borderRadius:6,border:`1px solid ${st.color}33`}}>{st.name}{st.price?` ₪${st.price}`:""}</span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Individual Stages */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{margin:0,fontSize:15}}>🔧 שלבים בודדים</h3>
          <Btn color="var(--c-accent)" small onClick={()=>setShowForm(p=>!p)}>+ שלב</Btn>
        </div>
        {showForm&&(
          <div style={{display:"flex",gap:10,alignItems:"flex-end",marginBottom:12,flexWrap:"wrap"}}>
            <Field label="שם" value={name} onChange={setName} style={{flex:1,minWidth:140}}/>
            <Field label="₪ ליחידה" type="number" value={price} onChange={setPrice} style={{minWidth:80}}/>
            <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:11,color:"var(--c-dim)",fontWeight:600}}>צבע</label><input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:36,height:34,padding:2,border:"1px solid var(--c-border)",borderRadius:6}}/></div>
            <Btn color="#10b981" onClick={add} small>הוסף</Btn>
            <Btn onClick={()=>setShowForm(false)} small>ביטול</Btn>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {stages.sort((a,b)=>a.order-b.order).map((s,i)=>(
            <div key={s.id} style={{background:"var(--c-card)",borderRadius:10,padding:"10px 14px",border:`1px solid ${s.color}33`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16,fontWeight:800,color:s.color,minWidth:24}}>{i+1}</span>
                <div style={{width:10,height:10,borderRadius:3,background:s.color}}/>
                <span style={{fontWeight:600}}>{s.name}</span>
                {editId===s.id?(<div style={{display:"flex",gap:4,alignItems:"center"}}><input type="number" value={editPrice} onChange={e=>setEditPrice(e.target.value)} style={{width:70,padding:"3px 6px",fontSize:12}}/><span style={{fontSize:11,color:"var(--c-dim)"}}>₪</span><IBtn onClick={()=>savePrice(s.id)}>✅</IBtn><IBtn onClick={()=>setEditId(null)}>✕</IBtn></div>):(
                  <span style={{fontSize:11,color:s.price?"#a78bfa":"var(--c-dim)",cursor:"pointer",padding:"2px 6px",borderRadius:6,background:"var(--c-deep)"}} onClick={()=>{setEditId(s.id);setEditPrice(s.price||0)}}>{s.price?`₪${s.price}`:"+₪"}</span>
                )}
              </div>
              <div style={{display:"flex",gap:3}}><IBtn onClick={()=>move(s.id,-1)}>⬆️</IBtn><IBtn onClick={()=>move(s.id,1)}>⬇️</IBtn><IBtn onClick={()=>del(s.id)}>🗑️</IBtn></div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ═══ PROJECTS ═══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function Projects({projects,orders,updP,stages,workLogs}){
  const {canEdit}=useAuth();
  const [showForm,setShowForm]=useState(false);
  const [name,setName]=useState("");
  const add=()=>{if(!name.trim())return;updP(prev=>[...prev,{id:uid(),name:name.trim()}]);setName("");setShowForm(false)};
  const del=id=>{if(orders.some(o=>o.projectId===id))return alert('לא ניתן למחוק פרויקט עם פק"ע');updP(prev=>prev.filter(p=>p.id!==id))};
  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{margin:0}}>🏗️ פרויקטים</h2>
        {canEdit&&<Btn color="var(--c-accent)" onClick={()=>setShowForm(p=>!p)}>+ פרויקט חדש</Btn>}
      </div>
      {showForm&&(<Card style={{marginBottom:12,display:"flex",gap:10,alignItems:"flex-end",padding:12}}><div style={{flex:1}}><Field label="שם הפרויקט" value={name} onChange={setName}/></div><Btn color="#10b981" onClick={add}>הוסף</Btn><Btn onClick={()=>setShowForm(false)}>ביטול</Btn></Card>)}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:12}}>
        {projects.map((p,idx)=>{
          const po=orders.filter(o=>o.projectId===p.id);
          const totalSer=po.reduce((s,o)=>s+(o.serials||[]).length,0);
          const completed=po.reduce((s,o)=>(o.serials||[]).filter(sr=>{
            const oStages=(o.stageIds||[]);
            return oStages.every(sid=>workLogs.some(w=>w.serialId===sr.id&&w.stageId===sid&&w.completed));
          }).length+s,0);
          const pct=totalSer?Math.round(completed/totalSer*100):0;
          const rev=completed*po.reduce((s,o)=>s+Number(o.unitPrice||0),0)/Math.max(po.length,1);
          const c=COLORS[idx%COLORS.length];
          return(
            <Card key={p.id}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"center"}}>
                <span style={{fontWeight:700,fontSize:15}}>{p.name}</span>
                {canEdit&&<IBtn onClick={()=>del(p.id)}>🗑️</IBtn>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
                {[['פק"ע',po.length],["יחידות",totalSer],["הושלמו",completed],["אחוז",pct+"%"]].map(([l,v])=>(
                  <div key={l} style={{background:"var(--c-deep)",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:11,color:"var(--c-dim)"}}>{l}</div><div style={{fontWeight:700,fontSize:14}}>{v}</div></div>
                ))}
              </div>
              {totalSer>0&&<PBar pct={pct} h={7} color={c}/>}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ═══ ADMIN PANEL ════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function AdminPanel({projects,stages,onClose,lightMode,updO}){
  const {currentUser}=useAuth();
  const [users,setUsersLocal]=useState(getUsers());
  const [tab,setTab]=useState("users");
  const [auditLog]=useState(getAuditLog());
  const [editUser,setEditUser]=useState(null);
  const [addMode,setAddMode]=useState(false);
  const [newUser,setNewUser]=useState({username:"",password:"",name:"",role:"worker",projectAccess:"all",stageAccess:"all",canEdit:false,canView:true,active:true,hourlyRate:0});
  const lm=lightMode;
  const card=lm?"#ffffff":"#131829";
  const border=lm?"#dde1e8":"#1e2a42";
  const text=lm?"#1a1f2e":"#e2e8f0";
  const muted=lm?"#5a6478":"#8b95a8";
  const inp={background:lm?"#f7f8fa":"#0a0e1a",border:`1px solid ${lm?"#c8cdd6":"#283650"}`,color:text,borderRadius:6,padding:"7px 10px",paddingRight:"30px",fontSize:13,width:"100%",outline:"none",fontFamily:"inherit"};

  const addUser=()=>{
    if(!newUser.username||!newUser.password||!newUser.name)return alert("כל השדות הם חובה");
    if(users.find(u=>u.username===newUser.username))return alert("שם משתמש קיים");
    const u={...newUser,id:uid()};
    const updated=[...users,u];
    saveUsers(updated);setUsersLocal(updated);
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"הוספת משתמש",target:newUser.username,details:newUser.name});
    setNewUser({username:"",password:"",name:"",role:"worker",projectAccess:"all",stageAccess:"all",canEdit:false,canView:true,active:true,hourlyRate:0});
    setAddMode(false);
  };
  const saveUser=()=>{
    if(!editUser.username||!editUser.name)return alert("שם משתמש ושם מלא חובה");
    const updated=users.map(u=>u.id===editUser.id?editUser:u);
    saveUsers(updated);setUsersLocal(updated);
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"עדכון משתמש",target:editUser.username,details:editUser.name});
    setEditUser(null);
  };
  const toggleActive=id=>{
    const updated=users.map(u=>u.id===id?{...u,active:!u.active}:u);
    saveUsers(updated);setUsersLocal(updated);
  };
  const deleteUser=id=>{
    if(!confirm("למחוק משתמש לצמיתות?"))return;
    const updated=users.filter(u=>u.id!==id);
    saveUsers(updated);setUsersLocal(updated);
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"מחיקת משתמש",target:users.find(u=>u.id===id)?.name||"",details:""});
  };
  const undoImport=()=>{
    const snapshot=LS.get("importSnapshot");
    if(!snapshot)return alert("אין גיבוי לשחזור");
    if(!confirm(`לשחזר ${snapshot.length} פקעות מלפני הייבוא?`))return;
    updO(snapshot);
    LS.set("importSnapshot",null);
    addAuditEntry({userId:currentUser.id,username:currentUser.username,name:currentUser.name,action:"ביטול ייבוא",target:`שוחזרו ${snapshot.length} פקעות`,details:""});
  };

          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:muted}}>✕</button>
        </div>
        <div style={{padding:"0 24px 24px"}}>
          <div style={{display:"flex",gap:6,margin:"14px 0",flexWrap:"wrap"}}>
            {[["users","👥 משתמשים"],["audit","📋 יומן"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{background:tab===k?"var(--c-accent)":"transparent",border:`1px solid ${tab===k?"var(--c-accent)":border}`,color:tab===k?"#fff":muted,borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>

          {tab==="users"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:14,fontWeight:700,color:text}}>משתמשים ({users.length})</div>
                <Btn color="var(--c-accent)" small onClick={()=>setAddMode(true)}>+ הוסף משתמש</Btn>
              </div>
              {addMode&&(
                <div style={{background:lm?"#f7f8fa":"#0d1120",borderRadius:10,padding:16,marginBottom:12,border:`1px solid ${border}`}}>
                  <div style={{fontWeight:700,marginBottom:10,color:text}}>משתמש חדש</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:10}}>
                    {[["שם מלא","name","text"],["שם משתמש","username","text"],["סיסמה","password","password"],["תעריף שעתי ₪","hourlyRate","number"]].map(([l,k,t])=>(
                      <div key={k}><label style={{fontSize:11,color:muted,display:"block",marginBottom:3}}>{l}</label><input style={inp} type={t} value={newUser[k]||""} onChange={e=>setNewUser(p=>({...p,[k]:t==="number"?Number(e.target.value):e.target.value}))}/></div>
                    ))}
                    <div><label style={{fontSize:11,color:muted,display:"block",marginBottom:3}}>תפקיד</label>
                      <select style={inp} value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value,canEdit:e.target.value!=="viewer"}))}>

              <div style={{display:"flex",flexDirection:"column",gap:6}}>

                      {u.role!=="admin"&&u.id!==currentUser.id&&<IBtn onClick={()=>deleteUser(u.id)} title="מחק לצמיתות">🗑️</IBtn>}

          {tab==="audit"&&(
            <div>

                          <span style={{color:muted,fontSize:11}}>{e.timestamp?new Date(e.timestamp).toLocaleString("he-IL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):""}</span>

                      {e.details&&<div style={{color:muted,marginTop:2}}>{e.details}</div>}

        </div>
      </div>

      {/* Edit User Modal */}
      {editUser&&(
        <div onClick={()=>setEditUser(null)} style={{position:"fixed",inset:0,background:"#000000cc",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:card,borderRadius:16,padding:28,maxWidth:560,width:"100%",border:`1px solid ${border}`,maxHeight:"90vh",overflowY:"auto"}}>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:12}}>
              {[["שם מלא","name","text"],["שם משתמש","username","text"],["סיסמה","password","password"],["תעריף שעתי ₪","hourlyRate","number"]].map(([l,k,t])=>(
                <div key={k}><label style={{fontSize:11,color:muted,display:"block",marginBottom:3}}>{l}</label><input style={inp} type={t} value={editUser[k]||""} onChange={e=>setEditUser(p=>({...p,[k]:t==="number"?Number(e.target.value):e.target.value}))}/></div>
              ))}
              <div><label style={{fontSize:11,color:muted,display:"block",marginBottom:3}}>תפקיד</label>

                </select>
              </div>
            </div>
            {/* Project Access */}
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:muted,display:"block",marginBottom:3}}>גישה לפרויקטים</label>
              <div style={{border:`1px solid ${lm?"#c8cdd6":"#283650"}`,borderRadius:6,background:lm?"#f7f8fa":"#0a0e1a",padding:8}}>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",color:text,marginBottom:6}}>
                  <input type="checkbox" style={{width:"auto"}} checked={(editUser.projectAccess||"all")==="all"} onChange={e=>setEditUser(p=>({...p,projectAccess:e.target.checked?"all":[]}))}/>

              <div style={{border:`1px solid ${lm?"#c8cdd6":"#283650"}`,borderRadius:6,background:lm?"#f7f8fa":"#0a0e1a",padding:8}}>

          </div>
        </div>
      )}
    </div>
  );
}

// ═══ YIELD DASHBOARD ════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function YieldDashboard({orders,projects,stages,workLogs}){
  const yC=p=>p>=95?"#10b981":p>=85?"#3b82f6":p>=70?"#f59e0b":"#ef4444";
  const yL=p=>p>=95?"מצוין":p>=85?"טוב":p>=70?"בינוני":"נמוך";
  const typL={quality:"איכות",process:"תהליך",material:"חומר גלם",equipment:"ציוד",human:"גורם אנושי",other:"אחר"};
  const oY=orders.filter(o=>(o.serials||[]).length>0).map(o=>{
    const sn=(o.serials||[]).length,df=(o.defects||[]).filter(d=>d.status!=="closed").length;
    const yP=sn>0?Math.max(0,(1-df/sn)*100):100;
    return{...o,sn,df,yP,proj:projects.find(p=>p.id===o.projectId)};
  }).sort((a,b)=>a.yP-b.yP);
  const avg=oY.length?oY.reduce((s,o)=>s+o.yP,0)/oY.length:100;
  const worst=oY.filter(o=>o.yP<90).slice(0,5);
  const typeDonut=Object.entries(typL).map(([k,l])=>({label:l,value:orders.flatMap(o=>(o.defects||[]).filter(d=>d.type===k&&d.status!=="closed")).length})).filter(d=>d.value>0);
  return(
    <div className="fade-in">
      <h2 style={{margin:"0 0 14px",fontSize:18}}>📉 Yield — ניתוח תקלות</h2>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
        <Tile icon="📊" label="Yield ממוצע" value={avg.toFixed(1)+"%"} color={yC(avg)} warn={avg<70}/>
        <Tile icon="🔧" label="תקלות פתוחות" value={orders.flatMap(o=>(o.defects||[]).filter(d=>d.status!=="closed")).length} color="#ef4444"/>
        <Tile icon="✅" label="נסגרו" value={orders.flatMap(o=>(o.defects||[]).filter(d=>d.status==="closed")).length} color="#10b981"/>
        <Tile icon="📋" label='פק"ע עם תקלות' value={orders.filter(o=>(o.defects||[]).some(d=>d.status!=="closed")).length} color="#f59e0b"/>
      </div>

      {/* Table - mobile friendly */}
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12,fontSize:14}}>Yield לפי פק"ע</div>
        {oY.length===0?<div style={{color:"var(--c-dim)",textAlign:"center",padding:20}}>אין נתונים</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {oY.map(o=>(
              <div key={o.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"10px 12px",border:`1px solid ${yC(o.yP)}22`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
                  <div><span style={{fontWeight:700,color:"#60a5fa",fontSize:13}}>{o.woNumber}</span><span style={{fontSize:11,color:"#a78bfa",marginRight:6}}> {o.pn||""}</span></div>
                  <span style={{background:yC(o.yP)+"22",color:yC(o.yP),padding:"2px 8px",borderRadius:12,fontSize:11,fontWeight:700}}>{yL(o.yP)}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,height:8,background:"var(--c-border)",borderRadius:4,overflow:"hidden"}}><div style={{width:o.yP+"%",height:"100%",background:yC(o.yP),borderRadius:4}}/></div>
                  <span style={{fontWeight:800,color:yC(o.yP),fontSize:14,minWidth:50,textAlign:"left"}}>{o.yP.toFixed(1)}%</span>
                </div>
                <div style={{display:"flex",gap:12,fontSize:11,color:"var(--c-muted)",marginTop:4}}>
                  <span>{o.sn} יחידות</span>
                  <span style={{color:o.df>0?"#ef4444":"#10b981"}}>{o.df} תקלות</span>
                  {o.proj&&<span style={{color:"var(--c-tag-blue)"}}>{o.proj.name}</span>}
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Donut */}
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>תקלות לפי סוג</div>
        <DonutChart data={typeDonut} size={160}/>
      </Card>

      {worst.length>0&&(<Card style={{border:"1px solid #ef444433"}}>
        <div style={{fontWeight:700,fontSize:14,color:"#ef4444",marginBottom:10}}>🚨 Yield נמוך ביותר</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {worst.map(o=>(<div key={o.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"10px 12px",border:`1px solid ${yC(o.yP)}33`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontWeight:700,color:"#60a5fa",fontSize:13}}>{o.woNumber}</span>{o.proj&&<span style={{fontSize:11,color:"var(--c-tag-blue)",marginRight:6}}> {o.proj.name}</span>}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:11,background:yC(o.yP)+"22",color:yC(o.yP),padding:"2px 8px",borderRadius:12,fontWeight:600}}>{o.yP.toFixed(1)}%</span><span style={{fontSize:22,fontWeight:800,color:yC(o.yP)}}>{o.yP.toFixed(0)}%</span></div>
          </div>))}
        </div>
      </Card>)}
    </div>
  );
}
