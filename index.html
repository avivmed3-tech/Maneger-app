async function gsLoadUsers(){try{const r=await fetch(GS_URL+"?type=users&t="+Date.now());const t=await r.text();const d=JSON.parse(t);if(Array.isArray(d)&&d.length>0){LS.set("users",d);return d}return null}catch{return null}}
function getAuditLog(){return LS.get("audit")||[]}

// ── Auth Context ───────────────────────────────────────────────────────────
const AuthCtx=React.createContext(null);

// ── Shared UI ──────────────────────────────────────────────────────────────

// ── Simple Bar Chart (SVG) ─────────────────────────────────────────────────
function BarChart({data,color,formatVal,height=130}){
  const [hov,setHov]=useState(null);
  if(!data||!data.length)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--c-dim)",fontSize:13}}>אין נתונים</div>;
  const padL=36,padR=12,padT=20,padB=44,W=480,H=height+padT+padB;
  const maxV=Math.max(...data.map(d=>d.value),1);
  const mag=Math.pow(10,Math.floor(Math.log10(maxV)));
  const niceMax=Math.ceil(maxV/mag)*mag;
  const grids=[0,.25,.5,.75,1].map(f=>Math.round(niceMax*f));
  const slotW=(W-padL-padR)/data.length;
  const bw=Math.min(40,slotW*.55);
  const bx=i=>padL+i*slotW+slotW/2-bw/2;
  const bh=v=>Math.max((v/niceMax)*height,2);
  const by=v=>padT+height-bh(v);
  const fmtA=v=>v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":""+v;
  const MN=["","ינו","פבר","מרץ","אפר","מאי","יונ","יול","אוג","ספט","אוק","נוב","דצמ"];
  const fmtL=l=>{if(/^\d{4}-\d{2}$/.test(l)){const[y,m]=l.split("-");return MN[+m]+"'"+y.slice(2)}return l};
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {grids.map((v,i)=>{const y=padT+height-(v/niceMax)*height;return(<g key={i}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke="var(--c-chart-grid)" strokeWidth={i===0?1.5:1} strokeDasharray={i===0?"":"3 3"} opacity={i===0?1:.4}/><text x={padL-6} y={y+4} textAnchor="end" fill="var(--c-chart-label)" fontSize={10} fontFamily="sans-serif">{fmtA(v)}</text></g>)})}
      {data.map((d,i)=>{const x=bx(i),h=bh(d.value),y=by(d.value),isH=hov===i;return(
        <g key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{cursor:"pointer"}}>
          {isH&&<rect x={x-3} y={y-3} width={bw+6} height={h+3} rx={5} fill={color} opacity={0.12}/>}
          <rect x={x} y={y} width={bw} height={h} rx={4} fill={isH?color:color+"bb"}/>
          {isH&&(()=>{const tw=80,tx=Math.min(Math.max(bx(i)+bw/2-tw/2,padL),W-padR-tw);return(<g><rect x={tx} y={y-34} width={tw} height={26} rx={5} fill="var(--c-chart-tooltip)" stroke={color} strokeWidth={1}/><text x={tx+tw/2} y={y-17} textAnchor="middle" fill={color} fontSize={11} fontWeight="700" fontFamily="sans-serif">{formatVal(d.value)}</text></g>)})()}
        </g>
      )})}
      <line x1={padL} y1={padT+height} x2={W-padR} y2={padT+height} stroke="var(--c-chart-grid)" strokeWidth={1.5}/>
      {data.map((d,i)=><text key={i} x={bx(i)+bw/2} y={padT+height+20} textAnchor="middle" fill="var(--c-chart-label)" fontSize={11} fontWeight="600" fontFamily="sans-serif">{fmtL(d.label)}</text>)}
    </svg>
  );
}

// ── Donut Chart ────────────────────────────────────────────────────────────
function DonutChart({data,size=180}){
  const [hov,setHov]=useState(null);
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total||!data.length)return<div style={{height:size,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--c-dim)",flexDirection:"column",gap:8}}><span style={{fontSize:28}}>📊</span><span style={{fontSize:13}}>אין נתונים</span></div>;
  const R=size/2-10,r=R*.58,cx=size/2,cy=size/2;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=d.value/total,start=angle;angle+=pct*2*Math.PI;const end=angle,large=pct>.5?1:0;
    const x1=cx+R*Math.cos(start),y1=cy+R*Math.sin(start),x2=cx+R*Math.cos(end),y2=cy+R*Math.sin(end);
    const xi=cx+r*Math.cos(start),yi=cy+r*Math.sin(start),xo=cx+r*Math.cos(end),yo=cy+r*Math.sin(end);
    const path=pct>=.9999?`M${cx},${cy-R} A${R},${R} 0 1,1 ${cx-.001},${cy-R} Z`:`M${xi},${yi} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${xo},${yo} A${r},${r} 0 ${large},0 ${xi},${yi} Z`;
    return{...d,path,color:d.color||COLORS[i%COLORS.length],pct};
  });
  const hS=hov!=null?slices[hov]:null;
  return(
    <div style={{display:"flex",gap:16,alignItems:"center",justifyContent:"center",flexWrap:"wrap"}}>
      <svg width={size} height={size} style={{flexShrink:0}}>
        {slices.map((s,i)=>(<path key={i} d={s.path} fill={s.color} opacity={hov===null||hov===i?1:.4} stroke="var(--c-bg)" strokeWidth={2} style={{cursor:"pointer",transition:"opacity .2s"}} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}/>))}
        <circle cx={cx} cy={cy} r={r-2} fill="var(--c-card)"/>
        {hS?(<><text x={cx} y={cy-8} textAnchor="middle" fill={hS.color} fontSize={13} fontWeight="700" fontFamily="sans-serif">{hS.label.length>12?hS.label.slice(0,11)+"…":hS.label}</text><text x={cx} y={cy+10} textAnchor="middle" fill="var(--c-text)" fontSize={11} fontFamily="sans-serif">{hS.value.toLocaleString()}</text><text x={cx} y={cy+26} textAnchor="middle" fill="var(--c-muted)" fontSize={10} fontFamily="sans-serif">{Math.round(hS.pct*100)}%</text></>):(<><text x={cx} y={cy-2} textAnchor="middle" fill="var(--c-muted)" fontSize={10} fontFamily="sans-serif">סה"כ</text><text x={cx} y={cy+14} textAnchor="middle" fill="var(--c-text)" fontSize={13} fontWeight="700" fontFamily="sans-serif">{total.toLocaleString()}</text></>)}
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:5,minWidth:100}}>
        {slices.map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",opacity:hov===null||hov===i?1:.4,transition:"opacity .2s"}} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}><div style={{width:9,height:9,borderRadius:2,background:s.color,flexShrink:0}}/><span style={{fontSize:11,color:"var(--c-muted)",flex:1}}>{s.label}</span><span style={{fontSize:11,fontWeight:700,color:s.color}}>{Math.round(s.pct*100)}%</span></div>))}
      </div>
    </div>
  );
}

// ── Login Screen ───────────────────────────────────────────────────────────
function LoginScreen({onLogin,lightMode,toggleLight}){
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [err,setErr]=useState("");
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);
  const attempt=async()=>{
    setLoading(true);setErr("");
    await new Promise(r=>setTimeout(r,200));
    const users=getUsers();
    const u=users.find(u=>u.username===username&&u.password===password&&u.active!==false);
    if(!u){setErr("שם משתמש או סיסמה שגויים");setLoading(false);return}
    addAuditEntry({userId:u.id,username:u.username,name:u.name,action:"התחברות",target:"",details:""});
    onLogin(u);
  };
  const lm=lightMode;
  return(
    <div style={{minHeight:"100vh",minHeight:"100dvh",background:lm?"#f0f2f5":"#0a0e1a",display:"flex",alignItems:"center",justifyContent:"center",padding:16,transition:"background .3s"}}>
      <div style={{position:"fixed",top:16,left:16,zIndex:10}}>
        <button onClick={toggleLight} style={{background:lm?"#e2e8f0":"#131829",border:`1px solid ${lm?"#e2e8f0":"#1e2a42"}`,borderRadius:8,padding:"7px 14px",fontSize:15,color:lm?"#1a1f2e":"#8b95a8"}}>{lm?"🌙":"☀️"}</button>
      </div>
      <div style={{background:lm?"#ffffff":"#131829",borderRadius:20,padding:"clamp(24px,6vw,44px) clamp(20px,6vw,40px)",maxWidth:420,width:"100%",border:`1px solid ${lm?"#dde1e8":"#1e2a42"}`,boxShadow:lm?"0 8px 40px #0001":"0 20px 60px #000a"}}>
        <div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:52,marginBottom:10}}>⚙️</div><div style={{fontSize:24,fontWeight:800,color:lm?"#1a1f2e":"#e2e8f0",letterSpacing:-.5}}>ניהול קו ייצור</div><div style={{fontSize:13,color:lm?"#5a6478":"#8b95a8",marginTop:6}}>כניסה למערכת</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div><label style={{fontSize:12,color:"var(--c-muted)",fontWeight:600,display:"block",marginBottom:5}}>שם משתמש</label><input value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="הכנס שם משתמש"/></div>
          <div><label style={{fontSize:12,color:"var(--c-muted)",fontWeight:600,display:"block",marginBottom:5}}>סיסמה</label>
            <div style={{position:"relative"}}><input type={showPass?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="הכנס סיסמה" style={{paddingLeft:44}}/><button onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",fontSize:18,color:"var(--c-muted)",lineHeight:1}}>{showPass?"🙈":"👁️"}</button></div>
          </div>
          {err&&<div style={{background:lm?"#fee2e2":"#450a0a",color:lm?"#dc2626":"#fca5a5",borderRadius:8,padding:"10px 14px",fontSize:13,border:lm?"1px solid #fecaca":"1px solid #7f1d1d"}}>❌ {err}</div>}
          <button onClick={attempt} disabled={loading} style={{background:loading?"#2563eb99":"var(--c-accent)",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontWeight:700,fontSize:16,marginTop:4,fontFamily:"inherit"}}>{loading?"⏳ מתחבר...":"כניסה למערכת"}</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// ═══ DASHBOARD ═══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function Dashboard({orders,projects,stages,users,workLogs}){
  const [period,setPeriod]=useState("month");
  const [selYear,setSelYear]=useState("all");
  const [selProj,setSelProj]=useState("all");
  const [donutSlice,setDonutSlice]=useState("status");

  // Compute all years from workLogs
  const allYears=useMemo(()=>[...new Set(workLogs.filter(w=>w.completed&&w.endTime).map(w=>yK(w.endTime)).filter(Boolean))].sort().reverse(),[workLogs]);

  // Filter orders by project
  const fOrders=useMemo(()=>orders.filter(o=>selProj==="all"||o.projectId===selProj),[orders,selProj]);

  // Filter workLogs by year
  const fLogs=useMemo(()=>workLogs.filter(w=>{if(!w.completed||!w.endTime)return false;if(selYear!=="all"&&yK(w.endTime)!==selYear)return false;return true}),[workLogs,selYear]);

  // Helper: is serial done
  const isSerDone=(o,s)=>{const st=o.stageIds||[];return st.length>0&&st.every(sid=>workLogs.some(w=>w.serialId===s.id&&w.stageId===sid&&w.completed))};

  // KPIs
  const totalSerials=fOrders.reduce((s,o)=>s+(o.serials||[]).length,0);
  const completedSerials=fOrders.reduce((s,o)=>s+(o.serials||[]).filter(sr=>isSerDone(o,sr)).length,0);
  const actualRev=fOrders.reduce((s,o)=>{const done=(o.serials||[]).filter(sr=>isSerDone(o,sr)).length;return s+done*Number(o.unitPrice||0)},0);
  const totalWorkMins=fLogs.reduce((s,w)=>s+(w.durationMin||0),0);
  const totalWorkCost=fLogs.reduce((s,w)=>{const u=users.find(u2=>u2.id===w.userId);return s+(w.durationMin||0)*(Number(u?.hourlyRate||0)/60)},0);
  const openDefects=fOrders.flatMap(o=>(o.defects||[]).filter(d=>d.status!=="closed")).length;
  const openOrders=fOrders.filter(o=>{const sers=o.serials||[];return sers.length===0||sers.some(s=>!isSerDone(o,s))}).length;
  const openShortages=fOrders.flatMap(o=>(o.shortages||[]).filter(s2=>!s2.received)).length;
  const forecastRev=fOrders.reduce((s,o)=>{const remaining=Math.max(0,(o.serials||[]).length-(o.serials||[]).filter(sr=>isSerDone(o,sr)).length);return s+remaining*Number(o.unitPrice||0)},0);

  // Revenue by period
  const keyFn=d=>period==="year"?yK(d):period==="quarter"?qK(d):mkKey(d);
  const revByPeriod={};
  const counted=new Set();
  fLogs.forEach(w=>{
    const k=keyFn(w.endTime);if(!k)return;
    const o=fOrders.find(o2=>(o2.serials||[]).some(s=>s.id===w.serialId));if(!o)return;
    if(!isSerDone(o,{id:w.serialId}))return;
    const ck=w.serialId+"|"+k;if(counted.has(ck))return;counted.add(ck);
    if(!revByPeriod[k])revByPeriod[k]={rev:0,qty:0};
    revByPeriod[k].rev+=Number(o.unitPrice||0);revByPeriod[k].qty+=1;
  });
  const pKeys=Object.keys(revByPeriod).sort().slice(-10);

  // Donut data
  let donutData=[];
  if(donutSlice==="status"){
    donutData=[{label:"הושלמו",value:completedSerials},{label:"בתהליך",value:totalSerials-completedSerials}].filter(d=>d.value>0);
  }else if(donutSlice==="project"){
    donutData=projects.map(p=>{const po=fOrders.filter(o=>o.projectId===p.id);const done=po.reduce((s,o)=>(o.serials||[]).filter(sr=>isSerDone(o,sr)).length+s,0);return{label:p.name,value:done}}).filter(d=>d.value>0);
  }else{
    donutData=stages.map(st=>({label:st.name,value:fLogs.filter(w=>w.stageId===st.id).length,color:st.color})).filter(d=>d.value>0);
  }

  // Worker stats
  const workerStats=users.filter(u=>u.role!=="admin"&&u.active!==false).map(u=>{
    const logs=fLogs.filter(w=>w.userId===u.id&&w.durationMin);const totalMin=logs.reduce((s,w)=>s+w.durationMin,0);const units=logs.length;
    const cost=totalMin*(Number(u.hourlyRate||0)/60);const rev=logs.reduce((s,w)=>{const o2=orders.find(o3=>(o3.serials||[]).some(sr=>sr.id===w.serialId));return s+Number(o2?.unitPrice||0)},0);
    return{...u,totalMin,units,cost,revenue:rev,profit:rev-cost,uph:totalMin>0?(units/(totalMin/60)):0};
  }).sort((a,b)=>b.uph-a.uph);

  // Overdue
  const overdue=fOrders.filter(o=>o.targetDate&&new Date(o.targetDate)<new Date()&&(o.serials||[]).some(s=>!isSerDone(o,s)));

  return(
    <div className="fade-in">
      {/* Filter bar */}
      <div className="dash-filter-sticky" style={{position:"sticky",zIndex:40,background:"var(--c-bg)",paddingTop:8,paddingBottom:4,marginBottom:8}}>
        <Card style={{padding:"10px 14px",display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",boxShadow:"0 2px 8px #0003"}}>
          <span style={{fontSize:13,color:"var(--c-dim)",fontWeight:600,paddingBottom:2}}>🔍</span>
          <div style={{display:"flex",flexDirection:"column",gap:3,minWidth:140}}><label style={{fontSize:11,color:"var(--c-dim)"}}>פרויקט</label><select value={selProj} onChange={e=>setSelProj(e.target.value)} style={{padding:"5px 8px",fontSize:12}}><option value="all">כל הפרויקטים</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}><label style={{fontSize:11,color:"var(--c-dim)"}}>שנה</label><select value={selYear} onChange={e=>setSelYear(e.target.value)} style={{padding:"5px 8px",fontSize:12}}><option value="all">כל השנים</option>{allYears.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}><label style={{fontSize:11,color:"var(--c-dim)"}}>תקופה</label><SegBtn options={[["month","חודשי"],["quarter","רבעוני"],["year","שנתי"]]} value={period} onChange={setPeriod}/></div>
          {(selProj!=="all"||selYear!=="all")&&<button onClick={()=>{setSelProj("all");setSelYear("all")}} style={{background:"#374151",color:"#e2e8f0",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontFamily:"inherit"}}>✕ נקה</button>}
        </Card>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:9,marginBottom:14}}>
        <KpiBox i="📋" v={openOrders} label='פק"ע פתוחות' c="#f59e0b"/>
        <KpiBox i="🔢" v={totalSerials.toLocaleString()} label='סה"כ יחידות' c="#60a5fa"/>
        <KpiBox i="✅" v={completedSerials.toLocaleString()} label="הושלמו" c="#10b981"/>
        <KpiBox i="💰" v={fmtMoney(actualRev)} label="הכנסה ממומשת" c="#a78bfa"/>
        <KpiBox i="🔮" v={fmtMoney(forecastRev)} label="צפי הכנסות" c="#06b6d4"/>
        <KpiBox i="⏱️" v={fmtTime(totalWorkMins)} label="שעות עבודה" c="#3b82f6"/>
        <KpiBox i="💵" v={fmtMoney(totalWorkCost)} label="עלות עבודה" c="#f97316"/>
        <KpiBox i="🔧" v={openDefects} label="תקלות פתוחות" c="#ef4444"/>
        <KpiBox i="⚠️" v={openShortages} label="חוסרים פתוחים" c="#dc2626"/>
      </div>

      {/* Operational insights */}
      {(overdue.length>0)&&(
        <Card style={{marginBottom:12,border:"1px solid #ef444433"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#ef4444",marginBottom:8}}>🚨 פק"ע באיחור ({overdue.length})</div>
          {overdue.slice(0,5).map(o=>{const d=daysBetween(o.targetDate,todays());return(
            <div key={o.id} style={{background:"var(--c-deep)",borderRadius:8,padding:"8px 12px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid #ef444422"}}>
              <div><span style={{fontWeight:700,color:"#60a5fa"}}>{o.woNumber}</span><span style={{fontSize:11,color:"var(--c-dim)",marginRight:8}}>{o.description}</span></div>
              <span style={{color:"#ef4444",fontWeight:700,fontSize:12}}>+{d} ימים</span>
            </div>
          )})}
        </Card>
      )}

      {/* Worker Productivity */}
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>👥 הספק עובדים</div>
        {workerStats.length===0?<div style={{color:"var(--c-dim)",textAlign:"center",padding:20}}>אין נתונים</div>:(
          <div style={{overflowX:"auto"}}><table><thead><tr><th>עובד</th><th>יחידות</th><th>שעות</th><th>יח'/שעה</th><th>עלות</th><th>הכנסה</th><th>רווח</th></tr></thead><tbody>
            {workerStats.map(w=>(<tr key={w.id}><td style={{fontWeight:600}}>{w.name}</td><td style={{color:"#60a5fa"}}>{w.units}</td><td>{fmtTime(w.totalMin)}</td><td style={{fontWeight:700,color:"#06b6d4"}}>{w.uph.toFixed(1)}</td><td style={{color:"#f97316"}}>{fmtMoney(w.cost)}</td><td style={{color:"#a78bfa"}}>{fmtMoney(w.revenue)}</td><td style={{fontWeight:700,color:w.profit>=0?"#10b981":"#ef4444"}}>{fmtMoney(w.profit)}</td></tr>))}
          </tbody></table></div>
        )}
      </Card>

      {/* Charts */}
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1.6fr) minmax(0,1fr)",gap:12,marginBottom:12}} className="chart-grid">
        <Card>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>💰 הכנסות לפי {period==="month"?"חודש":period==="quarter"?"רבעון":"שנה"}</div>
          <BarChart data={pKeys.map(k=>({label:k,value:revByPeriod[k].rev}))} color="#a78bfa" formatVal={v=>fmtMoney(v)} height={130}/>
        </Card>
        <Card style={{display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontWeight:700,fontSize:14}}>📊 התפלגות</div><select value={donutSlice} onChange={e=>setDonutSlice(e.target.value)} style={{padding:"3px 6px",fontSize:11,width:"auto"}}><option value="status">סטטוס</option><option value="project">פרויקטים</option><option value="stage">שלבים</option></select></div>
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><DonutChart data={donutData} size={170}/></div>
        </Card>
      </div>

      {/* Quantities bar */}
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:700,fontSize:14}}>📦 כמויות שהושלמו</div><div style={{fontSize:12,color:"var(--c-muted)"}}>סה"כ: <b style={{color:"#3b82f6"}}>{pKeys.reduce((s,k)=>s+revByPeriod[k].qty,0).toLocaleString()}</b></div></div>
        <BarChart data={pKeys.map(k=>({label:k,value:revByPeriod[k].qty}))} color="#3b82f6" formatVal={v=>v.toLocaleString()} height={100}/>
      </Card>

      {/* Project progress */}
      <Card>
        <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>🏗️ התקדמות לפי פרויקט</div>
        {projects.map((p,idx)=>{
          const po=fOrders.filter(o=>o.projectId===p.id);const totalSer=po.reduce((s,o)=>s+(o.serials||[]).length,0);
          const completeSer=po.reduce((s,o)=>(o.serials||[]).filter(sr=>isSerDone(o,sr)).length+s,0);
          const pct=totalSer?Math.round(completeSer/totalSer*100):0;const c=COLORS[idx%COLORS.length];
          if(totalSer===0)return null;
          return(<div key={p.id} style={{background:"var(--c-deep)",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:9,height:9,borderRadius:2,background:c}}/><span style={{fontWeight:600,fontSize:13}}>{p.name}</span></div><span style={{fontSize:14,fontWeight:800,color:c}}>{pct}%</span></div>
            <PBar pct={pct} h={7} color={c}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--c-dim)",marginTop:4}}><span>{completeSer}/{totalSer} יחידות</span><span>{po.length} פק"ע</span></div>
          </div>);
        })}
      </Card>
    </div>
  );
}

// ═══ ORDERS (Work Orders / פקעות) ════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
function OrderForm({initial,projects,stages,stageBlocks,onSave,onClose}){
  const [f,setF]=useState({
    woNumber:initial?.woNumber||"",description:initial?.description||"",pn:initial?.pn||"",
    qty:initial?.qty||"",unitPrice:initial?.unitPrice||"",projectId:initial?.projectId||"",
    receivedDate:initial?.receivedDate||todays(),targetDate:initial?.targetDate||"",
    stageIds:initial?.stageIds||stages.map(s=>s.id),
    blockId:initial?.blockId||""
  });
  const [genSerials,setGenSerials]=useState(!initial);
  const [snPrefix,setSnPrefix]=useState(initial?.pn||"");
  const [snStart,setSnStart]=useState(1);
  const s=(k,v)=>{setF(p=>({...p,[k]:v}));if(k==="pn"&&!initial)setSnPrefix(v)};
  const toggleStage=sid=>setF(p=>({...p,stageIds:p.stageIds.includes(sid)?p.stageIds.filter(i=>i!==sid):[...p.stageIds,sid],blockId:""}));
  const selectBlock=blockId=>{
    if(!blockId){setF(p=>({...p,blockId:"",stageIds:stages.map(s2=>s2.id)}));return}
    const block=(stageBlocks||[]).find(b=>b.id===blockId);
    if(!block)return;
    // Map block stages to global stage IDs by name match
    const ids=block.stages.map(bs=>{const match=stages.find(s2=>s2.name===bs.name);return match?.id}).filter(Boolean);
    setF(p=>({...p,blockId,stageIds:ids}));
  };
  const handleSave=()=>{
    if(!f.woNumber||!f.qty)return alert('יש למלא מספר פק"ע וכמות');
    let serials=initial?.serials||[];
    if(genSerials&&!initial){
      const prefix=snPrefix||f.pn||f.woNumber;
      const count=Number(f.qty)||0;
      serials=[];
      for(let i=0;i<count;i++){
        serials.push({id:uid(),sn:`${prefix}-${String(snStart+i).padStart(4,"0")}`,createdAt:nowISO()});
      }
    }
    onSave({...f,_serials:serials});
  };
  return(
    <div>
      <h3 style={{margin:"0 0 16px",fontSize:18}}>{initial?'עריכת פק"ע':'פק"ע חדשה'}</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>
        <Field label='מספר פק"ע *' value={f.woNumber} onChange={v=>s("woNumber",v)}/>
        <Field label="P/N (מק״ט)" value={f.pn} onChange={v=>s("pn",v)}/>
        <Field label="תיאור" value={f.description} onChange={v=>s("description",v)}/>
        <Field label="כמות יחידות *" type="number" value={f.qty} onChange={v=>s("qty",v)}/>
        <Field label="מחיר ליחידה (₪)" type="number" value={f.unitPrice} onChange={v=>s("unitPrice",v)}/>
        <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:11,color:"var(--c-dim)",fontWeight:600}}>פרויקט</label><select value={f.projectId} onChange={e=>s("projectId",e.target.value)}><option value="">-- בחר פרויקט --</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
        <Field label="תאריך קבלה" type="date" value={f.receivedDate} onChange={v=>s("receivedDate",v)}/>
        <Field label="יעד אספקה" type="date" value={f.targetDate} onChange={v=>s("targetDate",v)}/>
      </div>
      {/* Serial number generation */}
      {!initial&&(
        <div style={{marginTop:14,background:"var(--c-deep)",borderRadius:10,padding:14,border:"1px solid var(--c-border)"}}>
          <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:genSerials?10:0}}>
            <input type="checkbox" checked={genSerials} onChange={e=>setGenSerials(e.target.checked)}/>
            🔢 צור מספרים סידוריים אוטומטית
          </label>
          {genSerials&&(
            <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
              <Field label="קידומת S/N" value={snPrefix} onChange={setSnPrefix} placeholder={f.pn||f.woNumber} style={{minWidth:120}}/>
              <Field label="מספר התחלתי" type="number" value={snStart} onChange={v=>setSnStart(Number(v))} style={{minWidth:80}}/>
              <div style={{fontSize:12,color:"var(--c-muted)",paddingBottom:8}}>
                {f.qty?`ייווצרו ${f.qty} סידוריים: ${snPrefix||f.pn||f.woNumber}-${String(snStart).padStart(4,"0")} עד ${snPrefix||f.pn||f.woNumber}-${String(snStart+Number(f.qty)-1).padStart(4,"0")}`:"הזן כמות"}
              </div>
            </div>
          )}
        </div>
      )}
      <div style={{marginTop:14}}>
        <label style={{fontSize:12,color:"var(--c-dim)",fontWeight:600,display:"block",marginBottom:6}}>שלבי עבודה לפק"ע זו:</label>
        {(stageBlocks||[]).length>0&&(
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:"#8b5cf6",fontWeight:600,display:"block",marginBottom:4}}>📦 בחר בלוק מוכן:</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <button onClick={()=>selectBlock("")} style={{background:!f.blockId?"var(--c-accent)22":"var(--c-deep)",border:`1px solid ${!f.blockId?"var(--c-accent)":"var(--c-border)"}`,borderRadius:8,padding:"5px 10px",fontSize:12,color:!f.blockId?"var(--c-accent)":"var(--c-muted)",fontFamily:"inherit",cursor:"pointer"}}>ללא בלוק</button>
              {(stageBlocks||[]).map(b=>(
                <button key={b.id} onClick={()=>selectBlock(b.id)} style={{background:f.blockId===b.id?"#8b5cf622":"var(--c-deep)",border:`1px solid ${f.blockId===b.id?"#8b5cf6":"var(--c-border)"}`,borderRadius:8,padding:"5px 10px",fontSize:12,color:f.blockId===b.id?"#8b5cf6":"var(--c-muted)",fontFamily:"inherit",cursor:"pointer"}}>
                  📦 {b.name} <span style={{fontSize:10,color:"var(--c-dim)"}}>({b.stages.length} שלבים, ₪{b.stages.reduce((s2,st)=>s2+(st.price||0),0)})</span>

}

function SerialsManager({order,stages,onUpdate,workLogs}){
  const {canEdit}=useAuth();
  const [addCount,setAddCount]=useState(1);
  const [prefix,setPrefix]=useState(order.pn||order.woNumber);
  const [startNum,setStartNum]=useState((order.serials||[]).length+1);
  const serials=order.serials||[];

  const addSerials=()=>{
    const newSerials=[];
    for(let i=0;i<addCount;i++){
      newSerials.push({id:uid(),sn:`${prefix}-${String(startNum+i).padStart(4,"0")}`,createdAt:nowISO()});
    }
    onUpdate({...order,serials:[...serials,...newSerials]});
    setStartNum(startNum+addCount);
  };

  const removeSn=id=>{
    if(!confirm("למחוק יחידה זו?"))return;
    onUpdate({...order,serials:serials.filter(s=>s.id!==id)});
  };

  const getStageStatus=(serialId,stageId)=>{
    const log=workLogs.find(w=>w.serialId===serialId&&w.stageId===stageId&&w.completed);
    if(log)return{done:true,user:log.userName,time:log.endTime,duration:log.durationMin};
    const active=workLogs.find(w=>w.serialId===serialId&&w.stageId===stageId&&!w.completed);
    if(active)return{active:true,user:active.userName,startTime:active.startTime};
    return{pending:true};
  };

  const oStages=(order.stageIds||[]).map(sid=>stages.find(s=>s.id===sid)).filter(Boolean).sort((a,b)=>a.order-b.order);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{margin:0,fontSize:15}}>🔢 מספרים סידוריים ({serials.length})</h3>
      </div>
      {canEdit&&(
        <div style={{background:"var(--c-deep)",borderRadius:8,padding:12,marginBottom:12,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Field label="קידומת" value={prefix} onChange={setPrefix} style={{minWidth:100}}/>
          <Field label="מספר התחלתי" type="number" value={startNum} onChange={v=>setStartNum(Number(v))} style={{minWidth:80}}/>
          <Field label="כמות להוספה" type="number" value={addCount} onChange={v=>setAddCount(Math.max(1,Number(v)))} style={{minWidth:80}}/>
          <Btn color="var(--c-accent)" onClick={addSerials}>+ הוסף {addCount} יחידות</Btn>
        </div>
      )}
      {serials.length===0?<div style={{color:"var(--c-dim)",textAlign:"center",padding:20}}>לא הוזנו מספרים סידוריים</div>:(
        <div style={{overflowX:"auto"}}>
          <table>
            <thead><tr><th>S/N</th>{oStages.map(st=><th key={st.id} style={{color:st.color}}>{st.name}</th>)}<th>סטטוס</th>{canEdit&&<th></th>}</tr></thead>
            <tbody>
              {serials.map(s=>{
                const allDone=oStages.every(st=>getStageStatus(s.id,st.id).done);
                const anyActive=oStages.some(st=>getStageStatus(s.id,st.id).active);
                return(
                  <tr key={s.id}>
                    <td style={{fontWeight:700,fontSize:12,color:"#7eb8ff"}}>{s.sn}</td>
                    {oStages.map(st=>{
                      const status=getStageStatus(s.id,st.id);
                      if(status.done)return<td key={st.id} style={{textAlign:"center"}}><span title={`${status.user} — ${fmtTime(status.duration)}`} style={{color:"#10b981",fontSize:16}}>✅</span></td>;
                      if(status.active)return<td key={st.id} style={{textAlign:"center"}}><span style={{animation:"pulse 1.5s infinite",color:"#f59e0b",fontSize:13}}>🔄 {status.user}</span></td>;
                      return<td key={st.id} style={{textAlign:"center",color:"var(--c-dim)"}}>—</td>;
                    })}
                    <td style={{textAlign:"center"}}>{allDone?<span style={{color:"#10b981",fontWeight:700,fontSize:12}}>✅ הושלם</span>:anyActive?<span style={{color:"#f59e0b",fontSize:12}}>🔄 בתהליך</span>:<span style={{color:"var(--c-dim)",fontSize:12}}>ממתין</span>}</td>
                    {canEdit&&<td><IBtn onClick={()=>removeSn(s.id)}>🗑️</IBtn></td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Shortages inside an Order (add/manage) ────────────────────────
function ShortagesInOrder({order,onUpdate}){
  const {canEdit}=useAuth();
  const [show,setShow]=useState(false);
  const [f,setF]=useState({item:"",sku:"",missing:"",reason:"",responsible:"",orderedDate:todays(),note:""});
  const [partialModal,setPartialModal]=useState(null);
  const [partialQty,setPartialQty]=useState("");
  const shortages=order.shortages||[];
  const addSh=()=>{if(!f.item)return;onUpdate({...order,shortages:[...shortages,{id:uid(),...f,received:false,receivedDate:null,receivedQty:0}]});setF({item:"",sku:"",missing:"",reason:"",responsible:"",orderedDate:todays(),note:""});setShow(false)};
  const markRec=id=>onUpdate({...order,shortages:shortages.map(s=>s.id===id?{...s,received:true,receivedDate:todays(),receivedQty:Number(s.missing||0)}:s)});
  const markRecPartial=(id,qty)=>{onUpdate({...order,shortages:shortages.map(s=>{if(s.id!==id)return s;const nq=Number(s.receivedQty||0)+Number(qty),tot=Number(s.missing||0);return{...s,receivedQty:nq,received:tot>0&&nq>=tot,receivedDate:todays()}})});setPartialModal(null);setPartialQty("")};
  const remSh=id=>onUpdate({...order,shortages:shortages.filter(s=>s.id!==id)});
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <h3 style={{margin:0,fontSize:15,color:"#f87171"}}>⚠️ חוסרים ({shortages.filter(s=>!s.received).length})</h3>
        {canEdit&&<Btn color="#ef4444" small onClick={()=>setShow(p=>!p)}>+ הוסף חוסר</Btn>}
      </div>
      {show&&(
        <div style={{background:"var(--c-deep)",borderRadius:8,padding:12,marginBottom:10,display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Field label="פריט חסר *" value={f.item} onChange={v=>setF(p=>({...p,item:v}))} style={{minWidth:160}}/>
          <Field label='מק"ט' value={f.sku} onChange={v=>setF(p=>({...p,sku:v}))}/>
          <Field label="כמות" type="number" value={f.missing} onChange={v=>setF(p=>({...p,missing:v}))}/>
          <Field label="סיבה" value={f.reason} onChange={v=>setF(p=>({...p,reason:v}))}/>
          <Field label="אחראי" value={f.responsible} onChange={v=>setF(p=>({...p,responsible:v}))}/>
          <Field label="תאריך הזמנה" type="date" value={f.orderedDate} onChange={v=>setF(p=>({...p,orderedDate:v}))}/>
          <Field label="הערה" value={f.note} onChange={v=>setF(p=>({...p,note:v}))}/>
          <Btn color="#ef4444" onClick={addSh} small>שמור</Btn>
          <Btn onClick={()=>setShow(false)} small>ביטול</Btn>
        </div>
      )}
      {shortages.length===0?<div style={{color:"var(--c-dim)",textAlign:"center",padding:12,fontSize:13}}>אין חוסרים</div>:(
        <div style={{overflowX:"auto"}}><table><thead><tr><th>פריט</th><th>מק"ט</th><th>כמות</th><th>התקבל</th><th>אחראי</th><th>סטטוס</th>{canEdit&&<th></th>}</tr></thead><tbody>
          {shortages.map(s=>{const rq=Number(s.receivedQty||0),tot=Number(s.missing||0),isPar=rq>0&&!s.received;return(
            <tr key={s.id} style={{opacity:s.received?.6:1}}>
              <td style={{fontWeight:600}}>{s.item}</td>
              <td style={{color:"#7eb8ff",fontSize:12}}>{s.sku||"—"}</td>
              <td>{tot||"—"}</td>
              <td style={{color:s.received?"#10b981":isPar?"#f59e0b":"var(--c-dim)",fontWeight:600}}>{s.received?tot:isPar?`${rq}/${tot}`:"—"}</td>
              <td style={{color:"#a78bfa",fontSize:12}}>{s.responsible||"—"}</td>
              <td>{s.received?<span style={{color:"#10b981",fontSize:12}}>✅</span>:isPar?<span style={{color:"#f59e0b",fontSize:12}}>📦</span>:<span style={{color:"#ef4444",fontSize:12}}>❌</span>}</td>
              {canEdit&&<td><div style={{display:"flex",gap:2}}>
                {!s.received&&<><IBtn onClick={()=>{setPartialModal(s.id);setPartialQty("")}} title="קבלה חלקית">📦</IBtn><IBtn onClick={()=>markRec(s.id)} title="התקבל">✅</IBtn></>}
                <IBtn onClick={()=>remSh(s.id)}>🗑️</IBtn>
              </div></td>}
            </tr>
          )})}
        </tbody></table></div>
      )}
      {partialModal&&(<div onClick={()=>setPartialModal(null)} style={{position:"fixed",inset:0,background:"#000c",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div onClick={e=>e.stopPropagation()} style={{background:"var(--c-card)",borderRadius:12,padding:24,minWidth:280,border:"1px solid var(--c-border2)"}}><div style={{fontWeight:700,fontSize:16,marginBottom:12,color:"#f59e0b"}}>📦 קבלה חלקית</div><Field label="כמות שהתקבלה" type="number" value={partialQty} onChange={setPartialQty}/><div style={{display:"flex",gap:8,marginTop:14}}><Btn color="#f59e0b" onClick={()=>partialQty&&markRecPartial(partialModal,partialQty)}>שמור</Btn><Btn onClick={()=>setPartialModal(null)}>ביטול</Btn></div></div></div>)}
    </div>
  );
}

  );
}
